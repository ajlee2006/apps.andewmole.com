<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chess Bot Gallery</title>

<!-- chess.js (game state, legal moves, FEN, check/checkmate) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<!-- jQuery (chessboard.js dependency) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- chessboard.js -->
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0e0d0b;
    --bg-elev: #181613;
    --ink: #e8e2d4;
    --ink-dim: #9a8f7c;
    --ink-faint: #5a5347;
    --accent: #c9a96a;
    --accent-warm: #d97757;
    --line: #2a2620;
    --line-strong: #3d3830;
    --good: #8ab464;
    --bad: #c46a5b;
    --shadow: 0 20px 60px -20px rgba(0,0,0,0.7);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* subtle paper texture via gradient */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(201,169,106,0.06), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(217,119,87,0.04), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 28px;
    margin-bottom: 40px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 16px;
  }

  .masthead {
    display: flex;
    align-items: baseline;
    gap: 18px;
  }

  .masthead .glyph {
    font-size: 44px;
    color: var(--accent);
    line-height: 1;
    transform: translateY(4px);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 44px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
  }

  /* Bot selector tabs */
  .bots {
    display: flex;
    gap: 0;
    border: 1px solid var(--line-strong);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
    background: var(--bg-elev);
  }

  .bot-tab {
    flex: 1;
    background: transparent;
    border: none;
    border-right: 1px solid var(--line-strong);
    color: var(--ink-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    padding: 18px 12px 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    text-align: center;
  }
  .bot-tab:last-child { border-right: none; }
  .bot-tab:hover { color: var(--ink); background: rgba(201,169,106,0.04); }
  .bot-tab.active {
    color: var(--ink);
    background: rgba(201,169,106,0.08);
  }
  .bot-tab.active::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 40px;
    height: 2px;
    background: var(--accent);
  }
  .bot-tab .num {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    margin-bottom: 4px;
    letter-spacing: 0.2em;
  }
  .bot-tab.active .num { color: var(--accent); }

  /* Description card */
  .desc {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 20px 24px;
    margin-bottom: 32px;
    font-style: italic;
    color: var(--ink);
    font-size: 18px;
  }
  .desc strong {
    font-style: normal;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  /* Main two-column layout */
  .game-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 40px;
    align-items: start;
  }

  @media (max-width: 880px) {
    .game-grid { grid-template-columns: 1fr; }
    .wrap { padding: 28px 18px 60px; }
    h1 { font-size: 34px; }
    .bot-tab { font-size: 15px; padding: 14px 6px 12px; }
  }

  .board-wrap {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  #board { width: 100%; }

  /* override chessboard.js for our theme */
  .white-1e1d7 { background: #e8d9b8 !important; }
  .black-3c85d { background: #6b5a3e !important; }
  .highlight1-32417, .highlight2-9c5d2 {
    box-shadow: inset 0 0 0 3px var(--accent) !important;
  }

  /* Side panel */
  .panel { display: flex; flex-direction: column; gap: 20px; }

  .status-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    padding: 20px 24px;
  }
  .status-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .status {
    font-size: 24px;
    font-style: italic;
    color: var(--ink);
  }
  .status.thinking { color: var(--accent); }
  .status.gameover { color: var(--accent-warm); }

  .controls-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .control-row {
    display: flex;
    gap: 10px;
  }

  button.btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--line-strong);
    color: var(--ink);
    padding: 10px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  button.btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(201,169,106,0.05);
  }
  button.btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  button.btn:disabled:hover {
    border-color: var(--line-strong);
    color: var(--ink);
    background: transparent;
  }

  .depth-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .depth-row label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
  }
  select.depth {
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line-strong);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
  }
  select.depth:focus { outline: none; border-color: var(--accent); }

  .engine-note {
    font-size: 13px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }
  .engine-note.ready { color: var(--good); }
  .engine-note.loading { color: var(--accent); }
  .engine-note.error { color: var(--bad); }

  /* PGN move list */
  .pgn-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    padding: 0;
    max-height: 280px;
    display: flex;
    flex-direction: column;
  }
  .pgn-header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
  }
  .pgn-body {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--line-strong) transparent;
  }
  .pgn-body::-webkit-scrollbar { width: 6px; }
  .pgn-body::-webkit-scrollbar-thumb { background: var(--line-strong); }

  .pgn-row {
    display: grid;
    grid-template-columns: 40px 1fr 1fr;
    padding: 6px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    align-items: center;
  }
  .pgn-row:nth-child(odd) { background: rgba(255,255,255,0.015); }
  .pgn-num { color: var(--ink-faint); }
  .pgn-w, .pgn-b { color: var(--ink); }
  .pgn-empty {
    text-align: center;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    padding: 24px;
  }

  footer {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer a { color: var(--ink-dim); text-decoration: none; border-bottom: 1px dotted var(--line-strong); }
  footer a:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="masthead">
      <span class="glyph">♞</span>
      <h1>Chess Bot Gallery</h1>
    </div>
    <div class="tagline">Four bots · Four philosophies · One board</div>
  </header>

  <div class="bots" role="tablist">
    <button class="bot-tab active" data-bot="worst"><span class="num">I</span>Worst Move</button>
    <button class="bot-tab" data-bot="random"><span class="num">II</span>Random</button>
    <button class="bot-tab" data-bot="nocheck"><span class="num">III</span>Avoids Check</button>
    <button class="bot-tab" data-bot="priority"><span class="num">IV</span>Prioritiser</button>
  </div>

  <div class="desc" id="desc"></div>

  <div class="game-grid">
    <div class="board-wrap">
      <div id="board"></div>
    </div>

    <div class="panel">
      <div class="status-card">
        <div class="status-label">Status</div>
        <div class="status" id="status">White to move</div>
      </div>

      <div class="controls-card">
        <div class="control-row">
          <button class="btn" id="newBtn">New Game</button>
          <button class="btn" id="undoBtn">Take Back</button>
        </div>
        <div class="depth-row">
          <label for="depth">Engine Depth</label>
          <select class="depth" id="depth">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="8">8</option>
            <option value="12">12</option>
          </select>
        </div>
        <div class="engine-note loading" id="engineNote">Loading engine…</div>
      </div>

      <div class="pgn-card">
        <div class="pgn-header">Moves</div>
        <div class="pgn-body" id="pgnBody">
          <div class="pgn-empty">No moves yet</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <span>Stockfish runs in your browser via WebAssembly. Nothing is sent to a server.</span>
    <span>Adapted from <a href="https://github.com/brokenloop/FlaskChess" target="_blank" rel="noopener">FlaskChess</a></span>
  </footer>
</div>

<script>
/* ============================================================
   Bot definitions
   ============================================================ */
const BOT_INFO = {
  worst:    { name: "Worst Move",     desc: "Plays the move Stockfish considers <strong>worst</strong> for itself. Expect blunders, gifts, and the occasional self-mate." },
  random:   { name: "Random",         desc: "Picks any legal move <strong>uniformly at random</strong>. No engine, no strategy — pure chaos." },
  nocheck:  { name: "Avoids Check",   desc: "Will <strong>never give check</strong> if any other legal move exists. Otherwise plays the worst non-checking move it can find." },
  priority: { name: "Prioritiser",    desc: "Follows a strict hierarchy: <strong>en passant → mate → check → promotion → capture → castle</strong>, avoiding stalemate where possible." },
};

let currentBot = "worst";
let game = new Chess();
let board = null;
let thinking = false;
let stockfish = null;
let stockfishReady = false;
let pendingResolver = null;
let pendingScore = null;

/* ============================================================
   Stockfish worker (loaded lazily — only worst & nocheck need it)
   ============================================================ */
function initStockfish() {
  const note = document.getElementById("engineNote");
  try {
    // Use lichess's stockfish.js build (single-threaded WASM, works everywhere)
    stockfish = new Worker("https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js");
    stockfish.onmessage = (e) => {
      const line = typeof e.data === "string" ? e.data : "";
      if (line === "uciok") {
        stockfish.postMessage("isready");
      } else if (line === "readyok") {
        if (!stockfishReady) {
          stockfishReady = true;
          note.textContent = "Engine ready";
          note.className = "engine-note ready";
        }
      } else if (line.startsWith("info ")) {
        // Parse score from "info ... score cp X" or "score mate Y"
        const cpMatch = line.match(/score cp (-?\d+)/);
        const mateMatch = line.match(/score mate (-?\d+)/);
        if (mateMatch) {
          const m = parseInt(mateMatch[1], 10);
          // Mate scores: dominate everything; sign indicates who's mating
          pendingScore = m > 0 ? 100000 - m : -100000 - m;
        } else if (cpMatch) {
          pendingScore = parseInt(cpMatch[1], 10);
        }
      } else if (line.startsWith("bestmove")) {
        if (pendingResolver) {
          const r = pendingResolver;
          pendingResolver = null;
          r(pendingScore !== null ? pendingScore : 0);
          pendingScore = null;
        }
      }
    };
    stockfish.onerror = () => {
      note.textContent = "Engine failed to load";
      note.className = "engine-note error";
    };
    stockfish.postMessage("uci");
  } catch (err) {
    note.textContent = "Engine unavailable (use Random or Prioritiser)";
    note.className = "engine-note error";
  }
}

// Evaluate a position with Stockfish at a given depth.
// Returns score in centipawns from White's perspective.
function evaluate(fen, depth) {
  return new Promise((resolve) => {
    if (!stockfishReady) { resolve(0); return; }
    pendingResolver = resolve;
    pendingScore = null;
    stockfish.postMessage("ucinewgame");
    stockfish.postMessage("position fen " + fen);
    stockfish.postMessage("go depth " + depth);
  });
}

// Score relative to the side to move at `fen`.
// (Mirrors python-chess's `score.relative`.)
async function evaluateRelative(fen, depth) {
  const score = await evaluate(fen, depth);
  // FEN's side-to-move field
  const stm = fen.split(" ")[1]; // 'w' or 'b'
  return stm === "w" ? score : -score;
}

/* ============================================================
   The four bots
   ============================================================ */

// I. Worst move: pick the move whose resulting position is *best for the opponent*
//    (i.e. highest relative score for the opponent, which == worst for us).
async function botWorst(depth) {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;

  let bestMove = moves[0];
  let bestScore = -Infinity; // we want HIGHEST score from opponent's perspective

  for (const m of moves) {
    game.move(m);
    const score = await evaluateRelative(game.fen(), depth);
    game.undo();
    // After we move, it's opponent's turn. Higher relative score for them = worse for us.
    if (score > bestScore) {
      bestScore = score;
      bestMove = m;
    }
  }
  return bestMove;
}

// II. Random: uniform random legal move. No engine needed.
function botRandom() {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;
  return moves[Math.floor(Math.random() * moves.length)];
}

// III. Avoids check: among non-checking moves, pick the worst for us
//      (= best for opponent). If every legal move gives check, plays random.
async function botNoCheck(depth) {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;

  const nonChecking = moves.filter(m => {
    game.move(m);
    const givesCheck = game.in_check();
    game.undo();
    return !givesCheck;
  });

  if (nonChecking.length === 0) {
    // Forced to give check — pick random
    return moves[Math.floor(Math.random() * moves.length)];
  }

  // Pick the worst non-checking move (mirrors the spirit of the original — bad moves, no checks)
  let bestMove = nonChecking[0];
  let bestScore = -Infinity;
  for (const m of nonChecking) {
    game.move(m);
    const score = await evaluateRelative(game.fen(), depth);
    game.undo();
    if (score > bestScore) {
      bestScore = score;
      bestMove = m;
    }
  }
  return bestMove;
}

// IV. Prioritiser: en passant → mate → check → promotion (queen) → capture → castle → non-stalemate
//     Mirrors python original. No engine needed.
function botPriority() {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;

  const nonStale = moves.filter(m => {
    game.move(m);
    const isStale = game.in_stalemate();
    game.undo();
    return !isStale;
  });

  const pool = nonStale.length > 0 ? nonStale : moves;
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  let move = pick(pool);

  const castles = pool.filter(m => m.flags.includes("k") || m.flags.includes("q"));
  if (castles.length) move = pick(castles);

  const captures = pool.filter(m => m.flags.includes("c") || m.flags.includes("e"));
  if (captures.length) move = pick(captures);

  const promotions = pool.filter(m => m.promotion === "q");
  if (promotions.length) move = pick(promotions);

  const checks = pool.filter(m => {
    game.move(m);
    const c = game.in_check();
    game.undo();
    return c;
  });
  if (checks.length) move = pick(checks);

  const mates = pool.filter(m => {
    game.move(m);
    const c = game.in_checkmate();
    game.undo();
    return c;
  });
  if (mates.length) move = pick(mates);

  const enPassants = pool.filter(m => m.flags.includes("e"));
  if (enPassants.length) move = pick(enPassants);

  return move;
}

/* ============================================================
   Dispatching to the active bot
   ============================================================ */
async function getBotMove() {
  const depth = parseInt(document.getElementById("depth").value, 10);
  switch (currentBot) {
    case "worst":    return await botWorst(depth);
    case "random":   return botRandom();
    case "nocheck":  return await botNoCheck(depth);
    case "priority": return botPriority();
  }
}

async function makeBotMove() {
  if (game.game_over()) return;
  thinking = true;
  setStatus("Bot is thinking…", "thinking");

  // Give the UI a tick to repaint before heavy work
  await new Promise(r => setTimeout(r, 30));

  const move = await getBotMove();
  if (move) {
    game.move(move);
    board.position(game.fen());
  }
  thinking = false;
  updateStatus();
  renderPgn();
}

/* ============================================================
   Board hookup
   ============================================================ */
function onDragStart(source, piece) {
  if (thinking) return false;
  if (game.game_over()) return false;
  // Player is always White in this UI
  if (piece.search(/^b/) !== -1) return false;
  if (game.turn() !== "w") return false;
}

function onDrop(source, target) {
  const move = game.move({ from: source, to: target, promotion: "q" });
  if (move === null) return "snapback";
  updateStatus();
  renderPgn();
  // After player moves, bot responds
  setTimeout(makeBotMove, 80);
}

function onSnapEnd() {
  board.position(game.fen());
}

/* ============================================================
   UI helpers
   ============================================================ */
function setStatus(text, cls = "") {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = "status " + cls;
}

function updateStatus() {
  const color = game.turn() === "w" ? "White" : "Black";
  if (game.in_checkmate()) {
    setStatus("Checkmate — " + color + " loses", "gameover");
  } else if (game.in_stalemate()) {
    setStatus("Stalemate", "gameover");
  } else if (game.in_draw()) {
    setStatus("Draw", "gameover");
  } else if (game.in_check()) {
    setStatus(color + " to move, in check", "");
  } else {
    setStatus(color + " to move", "");
  }
}

function renderPgn() {
  const body = document.getElementById("pgnBody");
  const history = game.history();
  if (history.length === 0) {
    body.innerHTML = '<div class="pgn-empty">No moves yet</div>';
    return;
  }
  let html = "";
  for (let i = 0; i < history.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    const w = history[i] || "";
    const b = history[i + 1] || "";
    html += `<div class="pgn-row"><span class="pgn-num">${num}.</span><span class="pgn-w">${w}</span><span class="pgn-b">${b}</span></div>`;
  }
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
}

function selectBot(bot) {
  currentBot = bot;
  document.querySelectorAll(".bot-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.bot === bot);
  });
  document.getElementById("desc").innerHTML = BOT_INFO[bot].desc;
  // Reflect engine-dependence in depth control
  const depthRow = document.querySelector(".depth-row");
  const usesEngine = (bot === "worst" || bot === "nocheck");
  depthRow.style.opacity = usesEngine ? "1" : "0.4";
  document.getElementById("depth").disabled = !usesEngine;
}

function newGame() {
  if (thinking) return;
  game.reset();
  board.start();
  updateStatus();
  renderPgn();
}

function takeBack() {
  if (thinking) return;
  game.undo(); // undo bot
  if (game.turn() !== "w") game.undo(); // undo player too, so it's white's turn again
  board.position(game.fen());
  updateStatus();
  renderPgn();
}

/* ============================================================
   Boot
   ============================================================ */
window.addEventListener("DOMContentLoaded", () => {
  board = Chessboard("board", {
    draggable: true,
    position: "start",
    onDragStart: onDragStart,
    onDrop: onDrop,
    onSnapEnd: onSnapEnd,
    pieceTheme: "https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/website/img/chesspieces/wikipedia/{piece}.png",
  });

  document.querySelectorAll(".bot-tab").forEach(t => {
    t.addEventListener("click", () => selectBot(t.dataset.bot));
  });
  document.getElementById("newBtn").addEventListener("click", newGame);
  document.getElementById("undoBtn").addEventListener("click", takeBack);

  selectBot("worst");
  updateStatus();
  initStockfish();

  // Keep board responsive
  window.addEventListener("resize", () => board.resize());
});
</script>
</body>
</html>
