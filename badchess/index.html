<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bad Chess Bots</title>

<!-- chess.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<!-- jQuery (chessboard.js dependency) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- chessboard.js -->
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  .nav {
    background: #242424;
    border-bottom: 1px solid #333;
    padding: 14px 24px;
  }
  .nav h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 500;
    color: #f0f0f0;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }
  .bots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .bot-btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #d0d0d0;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    border-radius: 3px;
  }
  .bot-btn:hover { background: #333; }
  .bot-btn.active {
    background: #3a6ea5;
    border-color: #4a7eb5;
    color: #fff;
  }
  .bot-desc {
    margin-bottom: 20px;
    font-size: 13px;
    color: #aaa;
    font-style: italic;
  }
  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }
  .col-board { flex: 1 1 400px; min-width: 320px; max-width: 560px; }
  .col-side  { flex: 1 1 320px; min-width: 280px; }
  #board { width: 100%; }
  /* slight frame so the board doesn't float on the dark bg */
  .col-board { padding: 8px; background: #242424; border: 1px solid #333; border-radius: 3px; }

  h3 { margin: 0 0 12px; font-size: 18px; font-weight: 500; color: #f0f0f0; }
  #status.thinking { color: #d4a857; }
  #status.gameover { color: #d97a7a; }

  .move-table-wrap {
    max-height: 240px;
    overflow-y: auto;
    border: 1px solid #333;
    background: #242424;
    margin-bottom: 16px;
  }
  table.moves {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.moves th, table.moves td {
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid #2e2e2e;
    color: #d0d0d0;
  }
  table.moves th { background: #2a2a2a; font-weight: 500; color: #aaa; }
  table.moves tr:nth-child(even) td { background: #1f1f1f; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #d0d0d0;
    padding: 7px 14px;
    cursor: pointer;
    border-radius: 3px;
    font-size: 14px;
  }
  .btn:hover { background: #333; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  select.depth {
    padding: 6px 10px;
    border: 1px solid #444;
    border-radius: 3px;
    background: #2a2a2a;
    color: #d0d0d0;
    font-size: 14px;
  }
  .engine-status {
    margin-top: 12px;
    font-size: 12px;
    color: #888;
  }
  .engine-status.ready { color: #7ab87a; }
  .engine-status.error { color: #d97a7a; }
  footer {
    margin-top: 30px;
    padding: 16px 24px;
    font-size: 12px;
    color: #888;
    text-align: center;
  }
  footer a { color: #6ba3d6; }
</style>
</head>
<body>

<div class="nav">
  <h1>Bad Chess Bots</h1>
</div>

<div class="container">

  <div class="bots">
    <button class="bot-btn active" data-bot="worst">Worst moves bot</button>
    <button class="bot-btn" data-bot="random">Random moves bot</button>
    <button class="bot-btn" data-bot="nocheck">Avoid checking bot</button>
    <button class="bot-btn" data-bot="priority">Prioritiser bot</button>
  </div>

  <div class="bot-desc" id="bot-desc"></div>

  <div class="row">
    <div class="col-board">
      <div id="board"></div>
    </div>
    <div class="col-side">
      <h3 id="status">White to move</h3>
      <div class="move-table-wrap">
        <table class="moves" id="pgn">
          <thead><tr><th>#</th><th>White</th><th>Black</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="controls">
        <button class="btn" id="backBtn">Take Back</button>
        <button class="btn" id="resetBtn">New Game</button>
        <select class="depth" id="depthSel">
          <option value="5">Depth: 5</option>
          <option value="4">Depth: 4</option>
          <option value="3" selected>Depth: 3</option>
          <option value="2">Depth: 2</option>
          <option value="1">Depth: 1</option>
        </select>
      </div>
      <div class="engine-status" id="engineStatus">Loading engine…</div>
    </div>
  </div>

  <footer>
    Stockfish runs in your browser via WebAssembly. Adapted from
    <a href="https://github.com/brokenloop/FlaskChess" target="_blank" rel="noopener">FlaskChess</a>.
  </footer>
</div>

<script>
/* ----- Bots ----- */
let currentBot = "worst";
const BOT_DESCS = {
  worst:    "Plays the move Stockfish considers worst.",
  random:   "Picks any legal move uniformly at random.",
  nocheck:  "Avoids giving check whenever possible.",
  priority: "Prioritises moves in this order: en passant, mate, check, promotion, capture, castle, non-stalemate.",
};

let game = new Chess();
let board = null;
let thinking = false;

/* ----- Stockfish worker ----- */
let stockfish = null;
let stockfishReady = false;
let pendingResolver = null;
let pendingScore = null;

function initStockfish() {
  const note = document.getElementById("engineStatus");
  try {
    stockfish = new Worker("https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js");
    stockfish.onmessage = (e) => {
      const line = typeof e.data === "string" ? e.data : "";
      if (line === "uciok") {
        stockfish.postMessage("isready");
      } else if (line === "readyok") {
        if (!stockfishReady) {
          stockfishReady = true;
          note.textContent = "Engine ready";
          note.className = "engine-status ready";
        }
      } else if (line.startsWith("info ")) {
        const mateMatch = line.match(/score mate (-?\d+)/);
        const cpMatch = line.match(/score cp (-?\d+)/);
        if (mateMatch) {
          const m = parseInt(mateMatch[1], 10);
          pendingScore = m > 0 ? 100000 - m : -100000 - m;
        } else if (cpMatch) {
          pendingScore = parseInt(cpMatch[1], 10);
        }
      } else if (line.startsWith("bestmove")) {
        if (pendingResolver) {
          const r = pendingResolver;
          pendingResolver = null;
          r(pendingScore !== null ? pendingScore : 0);
          pendingScore = null;
        }
      }
    };
    stockfish.onerror = () => {
      note.textContent = "Engine failed to load (Random/Prioritiser still work)";
      note.className = "engine-status error";
    };
    stockfish.postMessage("uci");
  } catch (err) {
    note.textContent = "Engine unavailable";
    note.className = "engine-status error";
  }
}

function evaluate(fen, depth) {
  return new Promise((resolve) => {
    if (!stockfishReady) { resolve(0); return; }
    pendingResolver = resolve;
    pendingScore = null;
    stockfish.postMessage("ucinewgame");
    stockfish.postMessage("position fen " + fen);
    stockfish.postMessage("go depth " + depth);
  });
}

// Score from the perspective of the side to move at `fen` (mirrors python-chess relative score).
async function evaluateRelative(fen, depth) {
  const score = await evaluate(fen, depth);
  const stm = fen.split(" ")[1];
  return stm === "w" ? score : -score;
}

/* ----- The four bots ----- */

// I. Worst: pick the move whose resulting position is best for the opponent.
async function botWorst(depth) {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;
  let bestMove = moves[0];
  let bestScore = -Infinity;
  for (const m of moves) {
    game.move(m);
    const score = await evaluateRelative(game.fen(), depth);
    game.undo();
    if (score > bestScore) { bestScore = score; bestMove = m; }
  }
  return bestMove;
}

// II. Random
function botRandom() {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;
  return moves[Math.floor(Math.random() * moves.length)];
}

// III. Avoid check: among non-checking moves, pick the worst for us. If forced to check, pick random.
async function botNoCheck(depth) {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;

  const nonChecking = moves.filter(m => {
    game.move(m);
    const c = game.in_check();
    game.undo();
    return !c;
  });

  if (nonChecking.length === 0) {
    return moves[Math.floor(Math.random() * moves.length)];
  }

  let bestMove = nonChecking[0];
  let bestScore = -Infinity;
  for (const m of nonChecking) {
    game.move(m);
    const score = await evaluateRelative(game.fen(), depth);
    game.undo();
    if (score > bestScore) { bestScore = score; bestMove = m; }
  }
  return bestMove;
}

// IV. Prioritiser: en passant > mate > check > promote(Q) > capture > castle > non-stalemate
function botPriority() {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;

  const nonStale = moves.filter(m => {
    game.move(m);
    const s = game.in_stalemate();
    game.undo();
    return !s;
  });

  const pool = nonStale.length > 0 ? nonStale : moves;
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  let move = pick(pool);

  const castles = pool.filter(m => m.flags.includes("k") || m.flags.includes("q"));
  if (castles.length) move = pick(castles);

  const captures = pool.filter(m => m.flags.includes("c") || m.flags.includes("e"));
  if (captures.length) move = pick(captures);

  const promos = pool.filter(m => m.promotion === "q");
  if (promos.length) move = pick(promos);

  const checks = pool.filter(m => {
    game.move(m);
    const c = game.in_check();
    game.undo();
    return c;
  });
  if (checks.length) move = pick(checks);

  const mates = pool.filter(m => {
    game.move(m);
    const c = game.in_checkmate();
    game.undo();
    return c;
  });
  if (mates.length) move = pick(mates);

  const eps = pool.filter(m => m.flags.includes("e"));
  if (eps.length) move = pick(eps);

  return move;
}

async function getBotMove() {
  const depth = parseInt(document.getElementById("depthSel").value, 10);
  switch (currentBot) {
    case "worst":    return await botWorst(depth);
    case "random":   return botRandom();
    case "nocheck":  return await botNoCheck(depth);
    case "priority": return botPriority();
  }
}

async function makeBotMove() {
  if (game.game_over()) return;
  thinking = true;
  setStatus("Bot is thinking…", "thinking");
  await new Promise(r => setTimeout(r, 30));
  const move = await getBotMove();
  if (move) {
    game.move(move);
    board.position(game.fen());
  }
  thinking = false;
  updateStatus();
  renderPgn();
}

/* ----- Board ----- */
function onDragStart(source, piece) {
  if (thinking) return false;
  if (game.game_over()) return false;
  if (piece.search(/^b/) !== -1) return false; // player is white
  if (game.turn() !== "w") return false;
}

function onDrop(source, target) {
  const move = game.move({ from: source, to: target, promotion: "q" });
  if (move === null) return "snapback";
  updateStatus();
  renderPgn();
  setTimeout(makeBotMove, 80);
}

function onSnapEnd() {
  board.position(game.fen());
}

/* ----- UI ----- */
function setStatus(text, cls = "") {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = cls;
}

function updateStatus() {
  const color = game.turn() === "w" ? "White" : "Black";
  if (game.in_checkmate()) {
    setStatus("Game over, " + color + " is in checkmate.", "gameover");
  } else if (game.in_stalemate()) {
    setStatus("Game over, stalemate.", "gameover");
  } else if (game.in_draw()) {
    setStatus("Game over, drawn position.", "gameover");
  } else if (game.in_check()) {
    setStatus(color + " to move, " + color + " is in check");
  } else {
    setStatus(color + " to move");
  }
}

function renderPgn() {
  const tbody = document.querySelector("#pgn tbody");
  const history = game.history();
  let html = "";
  for (let i = 0; i < history.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    const w = history[i] || "";
    const b = history[i + 1] || "";
    html += `<tr><td>${num}</td><td>${w}</td><td>${b}</td></tr>`;
  }
  tbody.innerHTML = html;
  const wrap = document.querySelector(".move-table-wrap");
  wrap.scrollTop = wrap.scrollHeight;
}

function selectBot(bot) {
  currentBot = bot;
  document.querySelectorAll(".bot-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.bot === bot);
  });
  document.getElementById("bot-desc").textContent = BOT_DESCS[bot];
  const usesEngine = (bot === "worst" || bot === "nocheck");
  document.getElementById("depthSel").disabled = !usesEngine;
}

function newGame() {
  if (thinking) return;
  game.reset();
  board.start();
  updateStatus();
  renderPgn();
}

function takeBack() {
  if (thinking) return;
  game.undo();
  if (game.turn() !== "w") game.undo();
  board.position(game.fen());
  updateStatus();
  renderPgn();
}

/* ----- Boot ----- */
window.addEventListener("DOMContentLoaded", () => {
  board = Chessboard("board", {
    draggable: true,
    position: "start",
    onDragStart: onDragStart,
    onDrop: onDrop,
    onSnapEnd: onSnapEnd,
    pieceTheme: "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png",
  });

  document.querySelectorAll(".bot-btn").forEach(b => {
    b.addEventListener("click", () => selectBot(b.dataset.bot));
  });
  document.getElementById("resetBtn").addEventListener("click", newGame);
  document.getElementById("backBtn").addEventListener("click", takeBack);

  selectBot("worst");
  updateStatus();
  initStockfish();

  window.addEventListener("resize", () => board.resize());
});
</script>
</body>
</html>
