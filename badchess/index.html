<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bad Chess Bots</title>

<!-- chess.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<!-- jQuery (chessboard.js dependency) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- chessboard.js -->
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  .nav {
    background: #242424;
    border-bottom: 1px solid #333;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nav h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 500;
    color: #f0f0f0;
  }
  .nav a.home-link {
    font-size: 13px;
    color: #aaa;
    text-decoration: none;
    border: 1px solid #444;
    padding: 5px 12px;
    border-radius: 3px;
  }
  .nav a.home-link:hover { color: #e0e0e0; background: #2a2a2a; }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Player pickers */
  .players {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 16px;
    padding: 12px 14px;
    background: #242424;
    border: 1px solid #333;
    border-radius: 3px;
  }
  .player-pick { display: flex; align-items: center; gap: 8px; }
  .player-pick label {
    font-size: 13px;
    color: #aaa;
    min-width: 50px;
  }
  .player-pick select {
    padding: 6px 10px;
    border: 1px solid #444;
    border-radius: 3px;
    background: #2a2a2a;
    color: #e0e0e0;
    font-size: 13px;
    cursor: pointer;
  }

  .bot-desc {
    margin-bottom: 16px;
    font-size: 13px;
    color: #aaa;
    font-style: italic;
    min-height: 1.4em;
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }
  .col-board { flex: 1 1 400px; min-width: 320px; max-width: 560px; padding: 8px; background: #242424; border: 1px solid #333; border-radius: 3px; }
  .col-side  { flex: 1 1 320px; min-width: 280px; }
  #board { width: 100%; }

  /* Move highlights */
  .square-55d63.highlight-selected {
    box-shadow: inset 0 0 0 3px rgba(255, 220, 100, 0.85);
  }
  .square-55d63.highlight-legal::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 28%;
    height: 28%;
    transform: translate(-50%, -50%);
    background: rgba(80, 80, 80, 0.55);
    border-radius: 50%;
    pointer-events: none;
  }
  .square-55d63.highlight-legal.highlight-capture::after {
    width: 90%;
    height: 90%;
    background: transparent;
    border: 6px solid rgba(80, 80, 80, 0.55);
    border-radius: 50%;
    box-sizing: border-box;
  }
  .square-55d63 { position: relative; }

  h3 { margin: 0 0 12px; font-size: 18px; font-weight: 500; color: #f0f0f0; }
  #status.thinking { color: #d4a857; }
  #status.gameover { color: #d97a7a; }

  .move-table-wrap {
    max-height: 240px;
    overflow-y: auto;
    border: 1px solid #333;
    background: #242424;
    margin-bottom: 16px;
  }
  table.moves { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.moves th, table.moves td {
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid #2e2e2e;
    color: #d0d0d0;
  }
  table.moves th { background: #2a2a2a; font-weight: 500; color: #aaa; }
  table.moves tr:nth-child(even) td { background: #1f1f1f; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #d0d0d0;
    padding: 7px 14px;
    cursor: pointer;
    border-radius: 3px;
    font-size: 14px;
  }
  .btn:hover { background: #333; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.danger { border-color: #8a4444; color: #d97a7a; }
  .btn.danger:hover { background: #3a2424; }
  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #d0d0d0;
    cursor: pointer;
    user-select: none;
  }
  .toggle input { cursor: pointer; }
  select.depth {
    padding: 6px 10px;
    border: 1px solid #444;
    border-radius: 3px;
    background: #2a2a2a;
    color: #d0d0d0;
    font-size: 14px;
  }
  .engine-status {
    margin-top: 12px;
    font-size: 12px;
    color: #888;
  }
  .engine-status.ready { color: #7ab87a; }
  .engine-status.error { color: #d97a7a; }
  footer {
    margin-top: 30px;
    padding: 16px 24px;
    font-size: 12px;
    color: #888;
    text-align: center;
  }
  footer a { color: #6ba3d6; }

  /* Analysis UI */
  .analysis-section {
    margin-top: 20px;
    padding: 16px;
    background: #242424;
    border: 1px solid #333;
    border-radius: 3px;
  }
  .analysis-section h3 {
    margin: 0 0 12px;
    font-size: 16px;
    color: #f0f0f0;
  }
  .analysis-progress {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 10px;
  }
  .eval-graph {
    position: relative;
    height: 80px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 2px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .eval-bar {
    position: absolute;
    width: 100%;
    left: 0;
    top: 50%;
    height: 1px;
    background: #444;
    z-index: 1;
  }
  .eval-graph svg {
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
  }
  /* Make table rows clickable in review mode */
  table.moves tr.move-row { cursor: pointer; }
  table.moves tr.move-row:hover td { background: #2a2a2a !important; }
  table.moves tr.move-row.active td { background: #3a4a5a !important; }
  /* Move quality annotations */
  .move-tag {
    display: inline-block;
    margin-left: 4px;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 2px;
    vertical-align: middle;
  }
  .move-tag.blunder    { background: #6b2424; color: #ffdada; }
  .move-tag.mistake    { background: #6b4a1a; color: #fff0d0; }
  .move-tag.inaccuracy { background: #4a4a1a; color: #fffcd0; }
  .review-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 10px;
  }
  .review-controls .nav-btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #d0d0d0;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 3px;
    font-size: 13px;
    font-family: monospace;
  }
  .review-controls .nav-btn:hover { background: #333; }
  .review-controls .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>

<body>

<div class="nav">
  <h1>Bad Chess Bots</h1>
  <a href="/" class="home-link">← Back to home</a>
</div>

<div class="container">

  <div class="players">
    <div class="player-pick">
      <label for="whiteSel">White</label>
      <select id="whiteSel">
        <option value="human" selected>Human</option>
        <option value="worst">Worst moves bot</option>
        <option value="random">Random moves bot</option>
        <option value="nocheck">Avoid checking bot</option>
        <option value="priority">Prioritiser bot</option>
      </select>
    </div>
    <div class="player-pick">
      <label for="blackSel">Black</label>
      <select id="blackSel">
        <option value="human">Human</option>
        <option value="worst" selected>Worst moves bot</option>
        <option value="random">Random moves bot</option>
        <option value="nocheck">Avoid checking bot</option>
        <option value="priority">Prioritiser bot</option>
      </select>
    </div>
  </div>

  <div class="bot-desc" id="bot-desc"></div>

  <div class="row">
    <div class="col-board">
      <div id="board"></div>
    </div>
    <div class="col-side">
      <h3 id="status">White to move</h3>
      <div class="move-table-wrap">
        <table class="moves" id="pgn">
          <thead><tr><th>#</th><th>White</th><th>Black</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="controls">
        <button class="btn" id="backBtn">Take Back</button>
        <button class="btn" id="resetBtn">New Game</button>
        <label class="toggle">
          <input type="checkbox" id="liveAnalysisToggle" checked>
          Live analysis
        </label>
        <button class="btn danger" id="stopBtn" style="display:none">Stop</button>
        <select class="depth" id="depthSel">
          <option value="5">Depth: 5</option>
          <option value="4">Depth: 4</option>
          <option value="3" selected>Depth: 3</option>
          <option value="2">Depth: 2</option>
          <option value="1">Depth: 1</option>
        </select>
      </div>
      <div class="engine-status" id="engineStatus">Loading engine…</div>

      <div class="analysis-section" id="analysisSection">
        <h3>Evaluation</h3>
        <div class="analysis-progress" id="analysisProgress">Live analysis will start once a move is played.</div>
        <div class="eval-graph" id="evalGraph" style="display:none">
          <div class="eval-bar"></div>
          <svg id="evalSvg" viewBox="0 0 100 80" preserveAspectRatio="none"></svg>
        </div>
        <div class="review-controls" id="reviewControls" style="display:none">
          <button class="nav-btn" id="rvStart">⏮</button>
          <button class="nav-btn" id="rvPrev">◀</button>
          <button class="nav-btn" id="rvNext">▶</button>
          <button class="nav-btn" id="rvEnd">⏭</button>
          <button class="btn" id="rvResume" style="margin-left:auto">Resume play</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    Stockfish runs in your browser via WebAssembly. Adapted from
    <a href="https://github.com/brokenloop/FlaskChess" target="_blank" rel="noopener">FlaskChess</a>.
  </footer>
</div>

<script>
/* ----- Descriptions ----- */
const BOT_DESCS = {
  worst:    "Plays the move Stockfish considers worst.",
  random:   "Picks any legal move uniformly at random.",
  nocheck:  "Avoids giving check whenever possible.",
  priority: "Prioritises moves in this order: en passant, mate, check, promotion, capture, castle, non-stalemate.",
};

let game = new Chess();
let board = null;
let thinking = false;
let stopRequested = false;
let selectedSquare = null; // for click-to-move highlighting

/* ----- Analysis state -----
   Live analysis runs in the background after every move. We maintain:
   - evalsByFen: a cache from FEN -> centipawn eval (White's POV), filled as positions are analyzed.
   - Per-render, we derive arrays of evals and classifications by walking the current game's history.
   
   reviewMode: when true, the board is showing a historical position and play is paused. */
const ANALYSIS_DEPTH = 12;
let evalsByFen = new Map();      // fen string -> cp eval from White's POV
let liveAnalysisEnabled = true;
let liveAnalysisRunning = false; // a backgroundAnalyze loop is in flight
let liveAnalysisGen = 0;         // bumped on every move; running loops bail when stale

let reviewMode = false;
let reviewPly = 0;
let savedFenBeforeReview = null;

/* ----- Stockfish worker ----- */
let stockfish = null;
let stockfishReady = false;
let pendingResolver = null;
let pendingScore = null;

async function initStockfish() {
  const note = document.getElementById("engineStatus");
  note.textContent = "Downloading engine…";
  note.className = "engine-status";

  const sources = [
    "https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js",
    "https://cdn.jsdelivr.net/gh/nmrugg/stockfish.js@v10.0.2/example/stockfish.js",
  ];

  let workerUrl = null, lastErr = null;
  for (const src of sources) {
    try {
      const resp = await fetch(src);
      if (!resp.ok) { lastErr = "HTTP " + resp.status + " from " + src; continue; }
      const code = await resp.text();
      const blob = new Blob([code], { type: "application/javascript" });
      workerUrl = URL.createObjectURL(blob);
      break;
    } catch (e) {
      lastErr = e.message || String(e);
    }
  }

  if (!workerUrl) {
    console.error("Stockfish load failed:", lastErr);
    note.textContent = "Engine unavailable (Random/Prioritiser still work)";
    note.className = "engine-status error";
    return;
  }

  try {
    stockfish = new Worker(workerUrl);
  } catch (e) {
    console.error("Worker construction failed:", e);
    note.textContent = "Engine unavailable: " + e.message;
    note.className = "engine-status error";
    return;
  }

  stockfish.onmessage = (e) => {
    const line = typeof e.data === "string" ? e.data : "";
    if (line === "uciok") {
      stockfish.postMessage("isready");
    } else if (line === "readyok") {
      if (!stockfishReady) {
        stockfishReady = true;
        note.textContent = "Engine ready";
        note.className = "engine-status ready";
        // If a game is already in progress, start live analysis now.
        scheduleLiveAnalysis();
      }
    } else if (line.startsWith("info ")) {
      const mateMatch = line.match(/score mate (-?\d+)/);
      const cpMatch = line.match(/score cp (-?\d+)/);
      if (mateMatch) {
        const m = parseInt(mateMatch[1], 10);
        pendingScore = m > 0 ? 100000 - m : -100000 - m;
      } else if (cpMatch) {
        pendingScore = parseInt(cpMatch[1], 10);
      }
    } else if (line.startsWith("bestmove")) {
      if (pendingResolver) {
        pendingResolver(pendingScore !== null ? pendingScore : 0);
      }
    }
  };
  stockfish.onerror = (err) => {
    console.error("Stockfish worker error:", err);
    note.textContent = "Engine error: " + (err.message || "see console");
    note.className = "engine-status error";
  };
  note.textContent = "Initialising engine…";
  stockfish.postMessage("uci");
}

/* Engine request queue. Stockfish cannot reliably handle overlapping `go`s,
   and a missed `bestmove` would leave the loop hung forever. We process one
   request at a time and time each out as a safety net. */
let engineQueue = Promise.resolve();

function evaluate(fen, depth) {
  // Chain onto the queue so two evaluate() calls never race.
  const task = engineQueue.then(() => new Promise((resolve) => {
    if (!stockfishReady) { resolve(0); return; }

    pendingScore = null;
    let settled = false;

    const finish = (val) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      pendingResolver = null;
      resolve(val);
    };

    pendingResolver = (val) => finish(val);

    // Safety net: if Stockfish never replies, don't hang forever.
    // Depth 5 on a worst-case position takes ~1s, so 8s is generous.
    const timer = setTimeout(() => {
      console.warn("Stockfish evaluate() timed out for fen=" + fen + " depth=" + depth);
      finish(pendingScore !== null ? pendingScore : 0);
    }, 8000);

    // `stop` cancels any lingering search, then `position` + `go` starts fresh.
    // No `ucinewgame` per call — the engine handles distinct positions fine
    // and ucinewgame seems to occasionally cause it to swallow the next bestmove.
    stockfish.postMessage("stop");
    stockfish.postMessage("position fen " + fen);
    stockfish.postMessage("go depth " + depth);
  }));
  engineQueue = task.catch(() => {}); // keep the chain alive even if something throws
  return task;
}

async function evaluateRelative(fen, depth) {
  const score = await evaluate(fen, depth);
  const stm = fen.split(" ")[1];
  return stm === "w" ? score : -score;
}

/* ===== Game analysis (live) ===== */

// Build the per-ply analysis arrays from the current game history + evalsByFen cache.
// Returns null if nothing is analyzed yet; otherwise { evals, classifications, fens, complete }.
// evals[i] is the eval of the position after ply i (i=0 is starting position). null if not yet analyzed.
function buildAnalysisData() {
  const verbose = game.history({ verbose: true });
  if (verbose.length === 0) return null;
  const replay = new Chess();
  const fens = [replay.fen()];
  for (const m of verbose) {
    replay.move(m);
    fens.push(replay.fen());
  }
  const evals = fens.map(f => evalsByFen.has(f) ? evalsByFen.get(f) : null);
  const classifications = new Array(fens.length).fill("");
  for (let i = 1; i < fens.length; i++) {
    if (evals[i] == null || evals[i - 1] == null) continue;
    const moverIsWhite = (i % 2 === 1);
    const before = moverIsWhite ? evals[i - 1] : -evals[i - 1];
    const after  = moverIsWhite ? evals[i]     : -evals[i];
    const drop = before - after;
    if      (drop >= 300) classifications[i] = "blunder";
    else if (drop >= 150) classifications[i] = "mistake";
    else if (drop >=  60) classifications[i] = "inaccuracy";
  }
  const complete = evals.every(e => e != null);
  return { evals, classifications, fens, complete };
}

// Schedule background analysis for the current game state.
// Called after every move. The running loop bails as soon as the game changes (via liveAnalysisGen).
function scheduleLiveAnalysis() {
  if (!liveAnalysisEnabled || !stockfishReady) {
    refreshAnalysisUI();
    return;
  }
  liveAnalysisGen++;
  refreshAnalysisUI();
  if (liveAnalysisRunning) return; // an existing loop will pick up the new generation
  liveAnalysisRunning = true;
  backgroundAnalyze().finally(() => { liveAnalysisRunning = false; });
}

async function backgroundAnalyze() {
  // Loop: figure out the next unanalyzed FEN in the current history, evaluate it, repeat.
  // If the game changes (liveAnalysisGen bumps) we restart from the top.
  while (true) {
    const myGen = liveAnalysisGen;
    const verbose = game.history({ verbose: true });
    if (verbose.length === 0) return;

    // Build the list of FENs we want analyzed (start position + after each ply).
    const replay = new Chess();
    const fens = [replay.fen()];
    for (const m of verbose) {
      replay.move(m);
      fens.push(replay.fen());
    }
    // Find the first FEN not yet in the cache.
    let nextIdx = -1;
    for (let i = 0; i < fens.length; i++) {
      if (!evalsByFen.has(fens[i])) { nextIdx = i; break; }
    }
    if (nextIdx === -1) {
      // Fully caught up.
      refreshAnalysisUI();
      // Wait briefly for any further move, then exit if still caught up.
      await new Promise(r => setTimeout(r, 200));
      if (liveAnalysisGen === myGen) return;
      continue;
    }

    // If a bot is currently calculating, don't compete — wait a moment and re-check.
    if (thinking) {
      await new Promise(r => setTimeout(r, 250));
      continue;
    }

    const targetFen = fens[nextIdx];
    const cp = await evaluate(targetFen, ANALYSIS_DEPTH);

    // If the game moved on while we were evaluating, that's fine — the result is still valid for this FEN.
    // (FENs uniquely identify a position; we cache by FEN, not by ply index.)
    const stm = targetFen.split(" ")[1];
    evalsByFen.set(targetFen, stm === "w" ? cp : -cp);

    refreshAnalysisUI();

    // If the game has changed since this iteration started, that's fine — we'll just continue and pick up the next missing FEN on the next loop.
    // Yield a tick to keep the UI responsive.
    await new Promise(r => setTimeout(r, 0));
  }
}

function refreshAnalysisUI() {
  const section = document.getElementById("analysisSection");
  const progress = document.getElementById("analysisProgress");
  const graphWrap = document.getElementById("evalGraph");
  const reviewCtrls = document.getElementById("reviewControls");

  if (!liveAnalysisEnabled) {
    progress.textContent = "Live analysis is off.";
    graphWrap.style.display = "none";
    reviewCtrls.style.display = "none";
    renderPgn();
    return;
  }

  const data = buildAnalysisData();
  if (!data) {
    progress.textContent = stockfishReady
      ? "Live analysis will start once a move is played."
      : "Waiting for engine to load…";
    graphWrap.style.display = "none";
    reviewCtrls.style.display = "none";
    renderPgn();
    return;
  }

  const totalPositions = data.fens.length;
  const analyzed = data.evals.filter(e => e != null).length;
  if (analyzed < totalPositions) {
    progress.textContent = `Analyzing… ${analyzed} / ${totalPositions} positions evaluated (depth ${ANALYSIS_DEPTH}).`;
  } else {
    progress.textContent = `All ${totalPositions} positions evaluated at depth ${ANALYSIS_DEPTH}. Click any move to review.`;
  }

  // Show graph as soon as we have at least 2 evals (otherwise nothing to draw)
  if (analyzed >= 2) {
    graphWrap.style.display = "";
    drawEvalGraph(data.evals);
  } else {
    graphWrap.style.display = "none";
  }

  // Show review controls once we're in review mode
  reviewCtrls.style.display = reviewMode ? "" : "none";

  renderPgn();
}

function drawEvalGraph(evals) {
  // Eval is in centipawns from White's POV. Clamp to ±1000cp (±10 pawns) for display.
  // Null entries (not yet analyzed) are skipped; we draw line segments between known points
  // and a dashed continuation if any are missing in the tail.
  const CLAMP = 1000;
  const svg = document.getElementById("evalSvg");
  const n = evals.length;
  if (n < 2) { svg.innerHTML = ""; return; }
  const toX = (i) => (i / (n - 1)) * 100;
  const toY = (cp) => {
    const v = Math.max(-CLAMP, Math.min(CLAMP, cp));
    return 40 - (v / CLAMP) * 40;
  };
  // Build the line over known points.
  const pts = [];
  for (let i = 0; i < n; i++) {
    if (evals[i] != null) pts.push([toX(i), toY(evals[i])]);
  }
  if (pts.length < 2) { svg.innerHTML = ""; return; }
  let linePath = "M " + pts[0][0] + " " + pts[0][1];
  for (let i = 1; i < pts.length; i++) linePath += " L " + pts[i][0] + " " + pts[i][1];
  let areaPath = linePath + ` L ${pts[pts.length - 1][0]} 80 L ${pts[0][0]} 80 Z`;
  svg.innerHTML = `
    <path d="${areaPath}" fill="rgba(106,163,214,0.18)" stroke="none"/>
    <path d="${linePath}" fill="none" stroke="#6ba3d6" stroke-width="0.8" vector-effect="non-scaling-stroke"/>
  `;
}

/* ----- Review mode (browse positions) ----- */
function enterReviewMode(ply) {
  reviewMode = true;
  reviewPly = ply;
  jumpToPly(ply);
}

function jumpToPly(ply) {
  const data = buildAnalysisData();
  if (!data) return;
  reviewPly = Math.max(0, Math.min(data.fens.length - 1, ply));
  const replay = new Chess();
  const history = game.history({ verbose: true });
  for (let i = 0; i < reviewPly; i++) replay.move(history[i]);
  board.position(replay.fen());
  document.getElementById("reviewControls").style.display = "";
  renderPgn(); // re-render to update .active highlight
  updateReviewNavButtons();
}

function updateReviewNavButtons() {
  const data = buildAnalysisData();
  if (!data) return;
  document.getElementById("rvStart").disabled = (reviewPly === 0);
  document.getElementById("rvPrev").disabled  = (reviewPly === 0);
  document.getElementById("rvNext").disabled  = (reviewPly === data.fens.length - 1);
  document.getElementById("rvEnd").disabled   = (reviewPly === data.fens.length - 1);
}

function exitReviewMode() {
  reviewMode = false;
  board.position(game.fen());
  document.getElementById("reviewControls").style.display = "none";
  renderPgn();
  updateStatus();
  // If a bot was on the move when review started, resume play.
  setTimeout(runBotsIfNeeded, 100);
}

/* ----- The four bots ----- */
async function botWorst(depth) {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;
  if (!stockfishReady) {
    console.warn("Worst bot: engine not ready, falling back to random.");
    return moves[Math.floor(Math.random() * moves.length)];
  }
  let bestMove = moves[0];
  let bestScore = -Infinity;
  for (const m of moves) {
    game.move(m);
    const score = await evaluateRelative(game.fen(), depth);
    game.undo();
    if (score > bestScore) { bestScore = score; bestMove = m; }
  }
  return bestMove;
}

function botRandom() {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;
  return moves[Math.floor(Math.random() * moves.length)];
}

async function botNoCheck(depth) {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;

  const nonChecking = moves.filter(m => {
    game.move(m);
    const c = game.in_check();
    game.undo();
    return !c;
  });

  if (nonChecking.length === 0) {
    return moves[Math.floor(Math.random() * moves.length)];
  }
  if (!stockfishReady) {
    console.warn("No-check bot: engine not ready, picking random non-checking move.");
    return nonChecking[Math.floor(Math.random() * nonChecking.length)];
  }

  let bestMove = nonChecking[0];
  let bestScore = -Infinity;
  for (const m of nonChecking) {
    game.move(m);
    const score = await evaluateRelative(game.fen(), depth);
    game.undo();
    if (score > bestScore) { bestScore = score; bestMove = m; }
  }
  return bestMove;
}

function botPriority() {
  const moves = game.moves({ verbose: true });
  if (moves.length === 0) return null;

  const nonStale = moves.filter(m => {
    game.move(m);
    const s = game.in_stalemate();
    game.undo();
    return !s;
  });

  const pool = nonStale.length > 0 ? nonStale : moves;
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  let move = pick(pool);

  const castles = pool.filter(m => m.flags.includes("k") || m.flags.includes("q"));
  if (castles.length) move = pick(castles);

  const captures = pool.filter(m => m.flags.includes("c") || m.flags.includes("e"));
  if (captures.length) move = pick(captures);

  const promos = pool.filter(m => m.promotion === "q");
  if (promos.length) move = pick(promos);

  const checks = pool.filter(m => {
    game.move(m);
    const c = game.in_check();
    game.undo();
    return c;
  });
  if (checks.length) move = pick(checks);

  const mates = pool.filter(m => {
    game.move(m);
    const c = game.in_checkmate();
    game.undo();
    return c;
  });
  if (mates.length) move = pick(mates);

  const eps = pool.filter(m => m.flags.includes("e"));
  if (eps.length) move = pick(eps);

  return move;
}

async function botMove(botKind) {
  const depth = parseInt(document.getElementById("depthSel").value, 10);
  switch (botKind) {
    case "worst":    return await botWorst(depth);
    case "random":   return botRandom();
    case "nocheck":  return await botNoCheck(depth);
    case "priority": return botPriority();
  }
  return null;
}

/* ----- Player roles ----- */
function whitePlayer() { return document.getElementById("whiteSel").value; }
function blackPlayer() { return document.getElementById("blackSel").value; }
function currentPlayer() {
  return game.turn() === "w" ? whitePlayer() : blackPlayer();
}
function bothBots() {
  return whitePlayer() !== "human" && blackPlayer() !== "human";
}

/* ----- Game loop: keep running while it's a bot's turn ----- */
async function runBotsIfNeeded() {
  while (!game.game_over() && currentPlayer() !== "human" && !stopRequested) {
    thinking = true;
    updateStopButton();
    setStatus("Bot is thinking…", "thinking");
    await new Promise(r => setTimeout(r, 30));

    const move = await botMove(currentPlayer());
    if (stopRequested) break;
    if (!move) break;

    game.move(move);
    board.position(game.fen());
    renderPgn();
    updateStatus();
    scheduleLiveAnalysis();

    // small pause between bot moves so you can watch
    if (bothBots() && !game.game_over()) {
      await new Promise(r => setTimeout(r, 400));
    }
  }
  thinking = false;
  stopRequested = false;
  updateStopButton();
  if (!game.game_over()) updateStatus();
}

/* ----- Click-to-move + drag highlights ----- */
function clearHighlights() {
  document.querySelectorAll(".square-55d63").forEach(sq => {
    sq.classList.remove("highlight-selected", "highlight-legal", "highlight-capture");
  });
}

function showLegalMoves(square) {
  const moves = game.moves({ square: square, verbose: true });
  if (moves.length === 0) return;
  const sqEl = document.querySelector('.square-' + square);
  if (sqEl) sqEl.classList.add("highlight-selected");
  for (const m of moves) {
    const target = document.querySelector('.square-' + m.to);
    if (!target) continue;
    target.classList.add("highlight-legal");
    if (m.flags.includes("c") || m.flags.includes("e")) {
      target.classList.add("highlight-capture");
    }
  }
}

function pieceBelongsToTurn(piece) {
  if (!piece) return false;
  return (game.turn() === "w" && piece[0] === "w") ||
         (game.turn() === "b" && piece[0] === "b");
}

function onDragStart(source, piece) {
  if (thinking) return false;
  if (reviewMode) return false;
  if (game.game_over()) return false;
  if (currentPlayer() !== "human") return false;
  if (!pieceBelongsToTurn(piece)) return false;
  clearHighlights();
  showLegalMoves(source);
  selectedSquare = null; // dragging takes over from clicking
}

function onDrop(source, target) {
  clearHighlights();
  const move = game.move({ from: source, to: target, promotion: "q" });
  if (move === null) return "snapback";
  selectedSquare = null;
  updateStatus();
  renderPgn();
  scheduleLiveAnalysis();
  setTimeout(runBotsIfNeeded, 60);
}

function onSnapEnd() {
  board.position(game.fen());
}

/* Click handler: tap a piece to select, tap a target to move (or another piece to switch). */
function onBoardClick(e) {
  if (thinking || game.game_over()) return;
  if (reviewMode) return;
  if (currentPlayer() !== "human") return;

  // find the square element
  const sqEl = e.target.closest(".square-55d63");
  if (!sqEl) return;
  const square = sqEl.getAttribute("data-square");
  if (!square) return;

  const piece = game.get(square); // chess.js: {type, color} or null

  if (selectedSquare) {
    // Try to make a move from selectedSquare -> square
    const legalTargets = game.moves({ square: selectedSquare, verbose: true });
    const match = legalTargets.find(m => m.to === square);
    if (match) {
      game.move({ from: selectedSquare, to: square, promotion: "q" });
      selectedSquare = null;
      clearHighlights();
      board.position(game.fen());
      updateStatus();
      renderPgn();
      scheduleLiveAnalysis();
      setTimeout(runBotsIfNeeded, 60);
      return;
    }
    // Clicked something that isn't a legal target
    selectedSquare = null;
    clearHighlights();
    // If they clicked another of their own pieces, switch selection
    if (piece && ((game.turn() === "w" && piece.color === "w") ||
                  (game.turn() === "b" && piece.color === "b"))) {
      selectedSquare = square;
      showLegalMoves(square);
    }
    return;
  }

  // No current selection — start one if it's their piece
  if (piece && ((game.turn() === "w" && piece.color === "w") ||
                (game.turn() === "b" && piece.color === "b"))) {
    selectedSquare = square;
    clearHighlights();
    showLegalMoves(square);
  }
}

/* ----- UI helpers ----- */
function setStatus(text, cls = "") {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = cls;
}

function updateStatus() {
  const color = game.turn() === "w" ? "White" : "Black";
  if (game.in_checkmate()) {
    setStatus("Game over, " + color + " is in checkmate.", "gameover");
  } else if (game.in_stalemate()) {
    setStatus("Game over, stalemate.", "gameover");
  } else if (game.in_draw()) {
    setStatus("Game over, drawn position.", "gameover");
  } else if (game.in_check()) {
    setStatus(color + " to move, " + color + " is in check");
  } else {
    setStatus(color + " to move");
  }
}

function renderPgn() {
  const tbody = document.querySelector("#pgn tbody");
  const history = game.history();
  const data = buildAnalysisData(); // may be null
  let html = "";
  for (let i = 0; i < history.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    const wPly = i, bPly = i + 1;
    const w = history[i] || "";
    const b = history[i + 1] || "";
    const wTag = annotationTag(data, wPly + 1);
    const bTag = annotationTag(data, bPly + 1);
    const wActive = (reviewMode && reviewPly === wPly + 1) ? "active" : "";
    const bActive = (reviewMode && reviewPly === bPly + 1) ? "active" : "";
    html += `<tr class="move-row">`;
    html += `<td>${num}</td>`;
    html += `<td class="${wActive}" data-ply="${wPly + 1}">${w}${wTag}</td>`;
    html += `<td class="${bActive}" data-ply="${b ? bPly + 1 : ""}">${b}${bTag}</td>`;
    html += `</tr>`;
  }
  tbody.innerHTML = html;
  const wrap = document.querySelector(".move-table-wrap");
  if (!reviewMode) wrap.scrollTop = wrap.scrollHeight;
}

function annotationTag(data, plyIdx) {
  if (!data || !data.classifications) return "";
  const cls = data.classifications[plyIdx];
  if (!cls) return "";
  if (cls === "blunder")    return ` <span class="move-tag blunder">??</span>`;
  if (cls === "mistake")    return ` <span class="move-tag mistake">?</span>`;
  if (cls === "inaccuracy") return ` <span class="move-tag inaccuracy">?!</span>`;
  return "";
}

function updateBotDesc() {
  // Describe whichever non-human players are in the game
  const w = whitePlayer(), b = blackPlayer();
  const parts = [];
  if (w !== "human") parts.push("White: " + BOT_DESCS[w]);
  if (b !== "human") parts.push("Black: " + BOT_DESCS[b]);
  document.getElementById("bot-desc").textContent = parts.join("  ·  ");
  // Depth selector only matters for engine-using bots
  const usesEngine = [w, b].includes("worst") || [w, b].includes("nocheck");
  document.getElementById("depthSel").disabled = !usesEngine;
}

function updateStopButton() {
  const stopBtn = document.getElementById("stopBtn");
  // Show Stop while bots are running (either current side is a bot and thinking is true)
  stopBtn.style.display = thinking ? "" : "none";
}

function newGame() {
  if (thinking) { stopRequested = true; }
  evalsByFen.clear();
  liveAnalysisGen++;
  reviewMode = false;
  reviewPly = 0;
  savedFenBeforeReview = null;
  game.reset();
  board.start();
  selectedSquare = null;
  clearHighlights();
  updateStatus();
  refreshAnalysisUI(); // re-render PGN + reset analysis panel
  // After reset, kick the bots if white is one
  setTimeout(runBotsIfNeeded, 100);
}

function takeBack() {
  if (thinking) return;
  if (reviewMode) {
    // Take Back while reviewing? Exit review first, then undo on the live game.
    exitReviewMode();
  }
  // Undo until it's a human's turn (or we run out of history)
  let undid = 0;
  while (game.history().length > 0) {
    game.undo();
    undid++;
    if (currentPlayer() === "human") break;
    // Safety: don't undo the whole game if nobody is human — just undo two plies
    if (undid >= 2) break;
  }
  selectedSquare = null;
  clearHighlights();
  board.position(game.fen());
  updateStatus();
  // Evals are cached by FEN so they remain valid for any position we revisit.
  liveAnalysisGen++;
  refreshAnalysisUI();
}

/* ----- Boot ----- */
window.addEventListener("DOMContentLoaded", () => {
  board = Chessboard("board", {
    draggable: true,
    position: "start",
    onDragStart: onDragStart,
    onDrop: onDrop,
    onSnapEnd: onSnapEnd,
    pieceTheme: "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png",
  });

  // Click-to-move
  document.getElementById("board").addEventListener("click", onBoardClick);

  document.getElementById("whiteSel").addEventListener("change", () => {
    updateBotDesc();
    if (!thinking) setTimeout(runBotsIfNeeded, 50);
  });
  document.getElementById("blackSel").addEventListener("change", () => {
    updateBotDesc();
    if (!thinking) setTimeout(runBotsIfNeeded, 50);
  });
  document.getElementById("resetBtn").addEventListener("click", newGame);
  document.getElementById("backBtn").addEventListener("click", takeBack);
  document.getElementById("stopBtn").addEventListener("click", () => { stopRequested = true; });
  document.getElementById("liveAnalysisToggle").addEventListener("change", (e) => {
    liveAnalysisEnabled = e.target.checked;
    if (liveAnalysisEnabled) {
      scheduleLiveAnalysis();
    } else {
      liveAnalysisGen++; // signal any running loop to bail
      refreshAnalysisUI();
    }
  });

  // Review-mode navigation
  document.getElementById("rvStart").addEventListener("click", () => jumpToPly(0));
  document.getElementById("rvPrev").addEventListener("click",  () => jumpToPly(reviewPly - 1));
  document.getElementById("rvNext").addEventListener("click",  () => jumpToPly(reviewPly + 1));
  document.getElementById("rvEnd").addEventListener("click",   () => {
    const data = buildAnalysisData();
    jumpToPly(data ? data.fens.length - 1 : 0);
  });
  document.getElementById("rvResume").addEventListener("click", exitReviewMode);

  // Click a row in the move table to jump to that position (entering review mode if needed)
  document.querySelector("#pgn").addEventListener("click", (e) => {
    if (!buildAnalysisData()) return;
    const td = e.target.closest("td[data-ply]");
    if (!td) return;
    const ply = parseInt(td.getAttribute("data-ply"), 10);
    if (Number.isFinite(ply)) {
      if (!reviewMode) enterReviewMode(ply); else jumpToPly(ply);
    }
  });

  updateBotDesc();
  updateStatus();
  initStockfish();

  window.addEventListener("resize", () => board.resize());

  // If white starts as a bot, kick the loop
  setTimeout(runBotsIfNeeded, 100);
});
</script>
