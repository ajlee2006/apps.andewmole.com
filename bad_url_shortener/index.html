<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bad URL Shortener</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<link rel="icon" href="/andewmole.png" type="image/png">
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #666;
    --accent: #0055aa;
    --bg: #fafaf7;
    --border: #ddd;
    --err: #b00020;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e8e8e8; --muted: #999; --accent: #6ab0ff; --bg: #1a1a1a; --border: #333; --err: #ff6b6b; }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 560px;
    margin: 4em auto;
    padding: 0 1.2em;
    color: var(--fg);
    background: var(--bg);
    line-height: 1.5;
  }
  h1 { font-size: 1.6em; margin-bottom: 0.2em; }
  .subtitle { color: var(--muted); font-size: 0.9em; margin-top: 0; }
  .subtitle a { color: var(--muted); }
  form { margin-top: 2em; }
  .row { display: flex; gap: 0.5em; margin-bottom: 1em; }
  input[type=text] {
    flex: 1;
    padding: 0.6em 0.8em;
    font-size: 1em;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--fg);
    font-family: inherit;
  }
  input[type=text]:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
  button {
    padding: 0.6em 1.2em;
    font-size: 1em;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #result {
    margin-top: 1.5em;
    padding: 1em;
    border-radius: 6px;
    background: rgba(0,0,0,0.03);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.9em;
    word-break: break-all;
    display: none;
  }
  #result.show { display: block; }
  #result.error { background: rgba(176,0,32,0.08); color: var(--err); }
  #result a { color: inherit; }
  #ts-help {
    display: none;
    margin-top: 0.8em;
    font-size: 0.9em;
    color: var(--err);
  }
  footer {
    margin-top: 3em;
    padding-top: 1.5em;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.85em;
  }
  .success-box { margin-top: 1.5em; }
  .success-box .label { font-size: 0.85em; color: var(--muted); margin-bottom: 0.3em; }
  .success-box .row2 { display: flex; gap: 0.4em; margin-bottom: 0.8em; }
  .success-box input {
    flex: 1;
    padding: 0.5em 0.7em;
    font-size: 0.9em;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--fg);
  }
  .success-box .copy-btn {
    padding: 0.5em 0.9em;
    font-size: 0.9em;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
  }
  .success-box .copy-btn:hover { background: rgba(0,0,0,0.05); }
  .success-box .dest {
    font-size: 0.9em;
    color: var(--muted);
    word-break: break-all;
  }
  .success-box .dest a { color: var(--muted); }
</style>
</head>
<body>

<h1>Bad URL Shortener</h1>
<p class="subtitle">A very lousy, extremely insecure link "shortener". All URLs are stored publicly on <a href="https://github.com/ajlee2006/bad_url_shortener_data/blob/main/data.json">GitHub</a>. Use at your own risk.</p>

<form id="form">
  <div class="row">
    <input type="text" id="url" placeholder="example.com" autofocus autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="go" type="submit" disabled>"Shorten"</button>
  </div>
  <div class="cf-turnstile"
       data-sitekey="0x4AAAAAAD1inzJXZFemFpaL"
       data-callback="onTurnstile"
       data-error-callback="onTurnstileError"
       data-expired-callback="onTurnstileExpired"></div>
  <div id="ts-help">
    Verification failed to load. Please disable ad blockers or privacy extensions for this site, or try a different browser.
  </div>
</form>

<div id="result"></div>

<footer><a href="/">Back to home</a></footer>

<script>
const LIST_URL = "https://raw.githubusercontent.com/ajlee2006/bad_url_shortener_data/main/data.json";
const params = new URLSearchParams(location.search);
const id = params.get("id");

// Redirect mode
if (id !== null) {
  document.body.innerHTML = '<h1>Bad URL Shortener</h1><p class="subtitle">Looking up…</p>';
  fetch(LIST_URL + "?t=" + Date.now())
    .then(r => r.json())
    .then(list => {
      const entry = list[parseInt(id)];
      if (!entry || !entry.url) throw new Error("Not found");
      document.body.innerHTML = `<h1>Bad URL Shortener</h1><p class="subtitle">Redirecting to <a href="${entry.url}">${entry.url}</a>…</p>`;
      location.replace(entry.url);
    })
    .catch(() => {
      document.body.innerHTML = `<h1>Bad URL Shortener</h1><p class="subtitle" style="color:var(--err)">ID ${id} not found.</p><p><a href="/bad_url_shortener/">Back</a></p>`;
    });
} else {
  // Submit mode
  let turnstileToken = null;
  const tsHelp = document.getElementById("ts-help");
  const goBtn = document.getElementById("go");

  window.onTurnstile = (token) => {
    turnstileToken = token;
    goBtn.disabled = false;
    tsHelp.style.display = "none";
  };
  window.onTurnstileError = () => {
    tsHelp.style.display = "block";
  };
  window.onTurnstileExpired = () => {
    turnstileToken = null;
    goBtn.disabled = true;
  };

  // If the Turnstile script itself was blocked, no callback ever fires
  setTimeout(() => {
    if (!window.turnstile) tsHelp.style.display = "block";
  }, 5000);

  const form = document.getElementById("form");
  const out = document.getElementById("result");

  function showError(msg) {
    out.className = "show error";
    out.textContent = msg;
  }

  form.onsubmit = async (e) => {
    e.preventDefault();
    let url = document.getElementById("url").value.trim();
    if (!url) { showError("Please enter a URL."); return; }
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;
    try { new URL(url); } catch { showError("Doesn't look like a valid URL."); return; }

    goBtn.disabled = true;
    goBtn.textContent = "Working…";
    out.className = "show";
    out.textContent = "Submitting…";

    try {
      const r = await fetch("/bad_url_shortener_shorten", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, turnstileToken }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Failed");
      const shortUrl = `${location.origin}/bad_url_shortener/?id=${data.id}`;
      out.className = "success-box";
      out.style.background = "transparent";
      out.style.padding = "0";
      out.innerHTML = `
        <div class="label">Your "shortened" URL is:</div>
        <div class="row2">
          <input type="text" id="short-url" value="${shortUrl}" readonly>
          <button type="button" class="copy-btn" id="copy-btn">Copy</button>
        </div>
        <div class="dest">Your "shortened" URL goes to: <a href="${data.url}">${data.url}</a></div>
        <div class="dest" style="margin-top: 0.4em;">⏱ Your link may take up to 5 minutes to start working. (It's not called Fast URL Shortener.)</div>
      `;
      out.style.display = "block";
      
      const copyBtn = document.getElementById("copy-btn");
      copyBtn.onclick = async () => {
        try {
          await navigator.clipboard.writeText(shortUrl);
          copyBtn.textContent = "Copied!";
          setTimeout(() => { copyBtn.textContent = "Copy"; }, 2000);
        } catch {
          // Fallback for older browsers or blocked clipboard
          const input = document.getElementById("short-url");
          input.select();
          document.execCommand("copy");
          copyBtn.textContent = "Copied!";
          setTimeout(() => { copyBtn.textContent = "Copy"; }, 2000);
        }
      };
      if (window.turnstile) window.turnstile.reset();
      turnstileToken = null;
    } catch (err) {
      showError(err.message);
    } finally {
      goBtn.textContent = `"Shorten"`;
      // stays disabled until Turnstile refreshes
    }
  };
}
</script>
</body>
</html>
