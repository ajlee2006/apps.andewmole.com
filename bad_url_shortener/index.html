<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bad URL Shortener</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #666;
    --accent: #0055aa;
    --bg: #fafaf7;
    --border: #ddd;
    --err: #b00020;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e8e8e8; --muted: #999; --accent: #6ab0ff; --bg: #1a1a1a; --border: #333; --err: #ff6b6b; }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 560px;
    margin: 4em auto;
    padding: 0 1.2em;
    color: var(--fg);
    background: var(--bg);
    line-height: 1.5;
  }
  h1 { font-size: 1.6em; margin-bottom: 0.2em; }
  .subtitle { color: var(--muted); font-size: 0.9em; margin-top: 0; }
  .subtitle a { color: var(--muted); }
  form { margin-top: 2em; }
  .row { display: flex; gap: 0.5em; margin-bottom: 1em; }
  input[type=url] {
    flex: 1;
    padding: 0.6em 0.8em;
    font-size: 1em;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--fg);
    font-family: inherit;
  }
  input[type=url]:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
  button {
    padding: 0.6em 1.2em;
    font-size: 1em;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #result {
    margin-top: 1.5em;
    padding: 1em;
    border-radius: 6px;
    background: rgba(0,0,0,0.03);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.9em;
    word-break: break-all;
    display: none;
  }
  #result.show { display: block; }
  #result.error { background: rgba(176,0,32,0.08); color: var(--err); }
  #result a { color: inherit; }
  footer {
    margin-top: 3em;
    padding-top: 1.5em;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.85em;
  }
</style>
</head>
<body>

<h1>Bad URL Shortener</h1>
<p class="subtitle">A very lousy, extremely insecure link shortener. All URLs are stored publicly on <a href="https://github.com/ajlee2006/bad_url_shortener_data/blob/main/data.json">GitHub</a>. Use at your own risk.</p>

<form id="form">
  <div class="row">
    <input type="url" id="url" placeholder="https://example.com" required autofocus>
    <button id="go" type="submit" disabled>Shorten</button>
  </div>
  <div class="cf-turnstile" data-sitekey="YOUR_SITE_KEY" data-callback="onTurnstile"></div>
</form>

<div id="result"></div>

<footer>Part of <a href="/">apps.andewmole.com</a>.</footer>

<script>
const LIST_URL = "https://raw.githubusercontent.com/ajlee2006/flaskurlshortener/main/list.json";
const params = new URLSearchParams(location.search);
const id = params.get("id");

// Redirect mode
if (id !== null) {
  document.body.innerHTML = '<h1>Bad URL Shortener</h1><p class="subtitle">Looking up…</p>';
  fetch(LIST_URL + "?t=" + Date.now())
    .then(r => r.json())
    .then(list => {
      const entry = list[parseInt(id)];
      if (!entry || !entry.url) throw new Error("Not found");
      document.body.innerHTML = `<h1>Bad URL Shortener</h1><p class="subtitle">Redirecting to <a href="${entry.url}">${entry.url}</a>…</p>`;
      location.replace(entry.url);
    })
    .catch(() => {
      document.body.innerHTML = `<h1>Bad URL Shortener</h1><p class="subtitle" style="color:var(--err)">ID ${id} not found.</p><p><a href="/bad_url_shortener/">Back</a></p>`;
    });
} else {
  // Submit mode
  let turnstileToken = null;
  window.onTurnstile = (token) => {
    turnstileToken = token;
    document.getElementById("go").disabled = false;
  };

  const form = document.getElementById("form");
  const out = document.getElementById("result");

  form.onsubmit = async (e) => {
    e.preventDefault();
    const url = document.getElementById("url").value.trim();
    const btn = document.getElementById("go");
    btn.disabled = true;
    btn.textContent = "Working…";
    out.className = "show";
    out.textContent = "Submitting…";

    try {
      const r = await fetch("/bad_url_shortener_shorten", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, turnstileToken }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Failed");
      const shortUrl = `${location.origin}/bad_url_shortener/?id=${data.id}`;
      out.className = "show";
      out.innerHTML = `→ <a href="${shortUrl}">${shortUrl}</a>`;
      // Reset turnstile so a second submission works
      if (window.turnstile) window.turnstile.reset();
      turnstileToken = null;
    } catch (err) {
      out.className = "show error";
      out.textContent = err.message;
    } finally {
      btn.textContent = "Shorten";
      // Button stays disabled until Turnstile refreshes
    }
  };
}
</script>
</body>
</html>
