<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LIVE Lightning Risk Map (CAT 1)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<link rel="icon" href="/andewmole.png" type="image/png">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
  #map { height: 100dvh; width: 100%; }
  .legend {
    background: rgba(255,255,255,0.95);
    padding: 10px 12px;
    border-radius: 6px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    font-size: 13px;
    line-height: 1.6;
  }
  .legend .swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 6px;
    vertical-align: middle;
    border: 1px solid #333;
  }
  .label-tooltip {
    background: rgba(255,255,255,0.85);
    border: 1px solid #555;
    border-radius: 3px;
    padding: 1px 5px;
    font-weight: 600;
    font-size: 11px;
    box-shadow: none;
  }
  .label-tooltip:before { display: none; }
  .hover-tooltip {
    background: rgba(0,0,0,0.85);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 6px 9px;
    font-size: 12px;
    line-height: 1.4;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    white-space: pre;          /* respect \n only, no auto-wrap */
    max-width: none;
  }
  /* Hide Leaflet's default tooltip arrow border (the thin line under the tip) */
  .hover-tooltip:before,
  .leaflet-tooltip-top.hover-tooltip:before {
    border: none !important;
  }
  .leaflet-interactive:focus { outline: none; }
  .user-location-dot {
    width: 12px;
    height: 12px;
    background: #1a73e8;
    border: 2px solid white;
    border-radius: 50%;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 2px 6px rgba(26,115,232,0.5);
  }
  /* Heavy rain warning banner */
  #rain-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 2000;        /* above Leaflet controls (which use 1000) */
    background: #b03020;
    color: #fff;
    padding: 10px 44px 10px 14px;
    font-size: 13px;
    line-height: 1.4;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    display: none;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  #rain-banner.visible { display: block; }
  /* When banner is showing, nudge Leaflet's top control corners down so they aren't hidden behind it */
  body.banner-visible .leaflet-top { margin-top: 56px; }
  #rain-banner-text { display: block; }
  #rain-banner .close-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    width: 28px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    border: none;
    background: transparent;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    border-radius: 4px;
  }
  #rain-banner .close-btn:hover { background: rgba(0,0,0,0.2); }
  /* Rain layer toggle in the legend */
  .legend .toggle-row {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid #ccc;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend .toggle-row label { cursor: pointer; user-select: none; }
  .legend .toggle-row .rain-time {
    font-size: 11px;
    color: #555;
    margin-left: auto;
  }
</style>
</head>
<body>
<div id="rain-banner" role="alert">
  <span id="rain-banner-text"></span>
  <button class="close-btn" id="rain-banner-close" aria-label="Dismiss">&times;</button>
</div>

const map = L.map('map');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const layerGroup = L.featureGroup().addTo(map);
const polygonsByName = {};   // name -> array of polygon layers (for live restyling)

FEATURES.forEach(feat => {
  polygonsByName[feat.name] = [];

  // Leaflet polygon accepts an array of rings; for a single feature
  // with multiple polygons we add each as its own layer.
  feat.polygons.forEach(rings => {
    const polygon = L.polygon(rings, styleFor(feat.name));

    // Hover-only tooltip with customisable text from SECTOR_TOOLTIPS.
    const hoverText = SECTOR_TOOLTIPS[feat.name];
    if (hoverText) {
      polygon.bindTooltip(hoverText, {
        sticky: true,            // follows the cursor
        direction: 'top',
        className: 'hover-tooltip',
        opacity: 1
      });
    }

    polygon.addTo(layerGroup);
    polygonsByName[feat.name].push(polygon);
  });

  // Place the label at the fixed coordinate defined in LABEL_POSITIONS.
  const labelPos = LABEL_POSITIONS[feat.name];
  if (labelPos) {
    L.tooltip({
      permanent: true,
      direction: 'center',
      className: 'label-tooltip',
      interactive: false
    })
      .setContent(feat.name)
      .setLatLng(labelPos)
      .addTo(map);
  }
});

map.fitBounds(layerGroup.getBounds(), { padding: [20, 20] });
// On narrow screens, zoom in one level so the map starts a bit closer.
if (window.innerWidth < 768) {

}

var colours = {};
var tooltips = {};
var catInfo = {}
var latestUpdateTime = null;   // set by parseApiResponse from the API's update_on field

// =============================================================
// Live colour updates from an API.
//
// applyColours(map) takes an object like { "1N": "red", "L2": "yellow" }
// and re-styles those polygons in place. Names not included keep their
// current colour. Unknown colour values fall back to "green".
// =============================================================
function applyColours() {
  Object.assign(POLYGON_COLOURS, colours || {});
  Object.assign(SECTOR_TOOLTIPS, tooltips || {});
  Object.assign(CAT_INFO, catInfo || {});

  const newColours = {};
  const newTooltips = {};
  const currentTime = new Date();

  for (const name in CAT_INFO) {
    var raw = CAT_INFO[name][0];
    const startTime = CAT_INFO[name][1];
    const endTime = CAT_INFO[name][2];
    const updateTime = CAT_INFO[name][3];
    //console.log(name,raw,formatTime(currentTime),formatTime(startTime),formatTime(endTime),formatTime(updateTime));
    if (raw == '1') {
      if (currentTime >= startTime) {
        raw = '0';
        if (currentTime > endTime) {
          raw = '1';
        }
      }
    }
    newColours[name] = STATUS_TO_COLOUR[raw];
    newTooltips[name] = "Sector " + name + "<br>CAT " + CAT_INFO[name][0] + " (" + formatTime(startTime) + "-" + formatTime(endTime) + ")<br>Updated " + formatTime(updateTime);
  }

  colours = newColours;
  tooltips = newTooltips;

  for (const name in (colours || {})) {
    const polys = polygonsByName[name];
    if (!polys) continue;
    const style = styleFor(name);
    polys.forEach(p => p.setStyle(style));
  }

  for (const name in (tooltips || {})) {
    const polys = polygonsByName[name];
    if (!polys) continue;
    const text = SECTOR_TOOLTIPS[name];
    polys.forEach(p => {
      if (p.getTooltip()) {
        p.setTooltipContent(text);
      } else if (text) {
        p.bindTooltip(text, {
          sticky: true,
          direction: 'top',
          className: 'hover-tooltip',
          opacity: 1
        });
      }
    });
  }
}

// Optional: if your API speaks in domain terms (e.g. "CAT 1") rather
// than colour names, map them here. Leave as identity if the API
// already returns "green" / "yellow" / "orange" / "red" / "faded-red".
const STATUS_TO_COLOUR = {
  '3':  'green',
  '2':  'yellow',
  '1':  'orange',
  '0':  'red',
  '-1': 'faded-red'
};

// Translates whatever the API returns into the {name: colour} shape
// applyColours expects. Adjust this if your API's response shape differs.
function parseApiResponse(data) {
  const newCatInfo = {};
  let maxUpdate = null;
  for (const entry in data["data"]["armysectors"]) {
    const name = data["data"]["armysectors"][entry]["sector"]["name"].slice(7);
    var raw = data["data"]["armysectors"][entry]["weather"]["CAT"];
    const currentTime = new Date();
    const startTime = new Date(Date.parse(data["data"]["armysectors"][entry]["weather"]["cat_start_on"]) + (currentTime.getTimezoneOffset() * 60000));
    const endTime = new Date(Date.parse(data["data"]["armysectors"][entry]["weather"]["cat_end_on"]) + (currentTime.getTimezoneOffset() * 60000));
    const updateTime = new Date(Date.parse(data["data"]["armysectors"][entry]["weather"]["update_on"]) + (currentTime.getTimezoneOffset() * 60000));
    if (maxUpdate === null || updateTime > maxUpdate) maxUpdate = updateTime;
    newCatInfo[name] = [raw, startTime, endTime, updateTime]
  }
  latestUpdateTime = maxUpdate;
  catInfo = newCatInfo;
}

function formatTime(d){
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');

  return `${hh}${mm}`;
}

async function refreshColours() {
  try {
    // Calls the local proxy (proxy.js), which forwards to SafeGuardian
    // server-side with the bearer token. See proxy.js for setup.
    const res = await fetch("https://api.andewmole.com/cat1/getWeatherInfo", { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    parseApiResponse(data);
    
    applyColours();

    // Reveal the colour legend on the first successful refresh.
    // Defer to the next frame so the polygon recolour has painted first —
    // otherwise the legend appears slightly before the polygons update.
    requestAnimationFrame(() => {
      const loadingEl = document.getElementById('legend-loading');
      const bodyEl = document.getElementById('legend-body');
      if (loadingEl) loadingEl.style.display = 'none';
      if (bodyEl) bodyEl.style.display = '';
    });

    // Update the legend's timestamp line.
    const el = document.getElementById('legend-timestamps');
    if (el) {
      const updatedStr   = latestUpdateTime ? formatTime(latestUpdateTime) : '\u2014';
      const refreshedStr = formatTime(new Date());
      el.textContent = `Updated ${updatedStr} | Refreshed ${refreshedStr}`;
    }
  } catch (err) {
    console.warn('Colour refresh failed:', err);
  }
}

// Comment out the next two lines while you're still wiring up the API.
refreshColours();
setInterval(refreshColours, 10000); // 10 seconds
setInterval(applyColours, 1000); // 1 second

  function startLocating() {
    if (watchId !== null) return;       // already watching
    watchId = navigator.geolocation.watchPosition(
      pos => {
        const latlng = [pos.coords.latitude, pos.coords.longitude];
        const accuracy = pos.coords.accuracy;       // metres
        if (userMarker) {
          userMarker.setLatLng(latlng);
          accuracyCircle.setLatLng(latlng).setRadius(accuracy);
        } else {
          accuracyCircle = L.circle(latlng, {
            radius: accuracy,
            color: '#1a73e8',
            weight: 1,
            opacity: 0.3,
            fillColor: '#1a73e8',
            fillOpacity: 0.15,
            interactive: false
          }).addTo(map);
          userMarker = L.marker(latlng, { icon: userIcon, interactive: false }).addTo(map);
        }
      },
      err => console.warn('Geolocation error:', err.message),
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );
  }

  // Small "locate me" button — only requests permission when clicked.
  const LocateControl = L.Control.extend({
    options: { position: 'topleft' },
    onAdd: function () {
      const btn = L.DomUtil.create('a', 'leaflet-bar leaflet-control locate-btn');
      btn.href = '#';
      btn.title = 'Show my location';
      btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align:middle;display:inline-block;" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" fill="#1a73e8"/><circle cx="12" cy="12" r="8"/><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/></svg>';
      btn.style.cssText = 'background:#fff;width:30px;height:30px;line-height:30px;text-align:center;text-decoration:none;display:block;';
      L.DomEvent.disableClickPropagation(btn);
      L.DomEvent.on(btn, 'click', e => {
        L.DomEvent.preventDefault(e);
        startLocating();
      });
      return btn;
    }
  });
  map.addControl(new LocateControl());
}

// =============================================================
// Rain radar overlay (toggleable layer above the sectors)
// Fetches the rainarea endpoint, takes the latest entry, and
// shows it as a translucent image overlay over Singapore.
// =============================================================
const RAIN_BOUNDS = [
  [1.15807400727996, 103.555749011281],   // SW
  [1.476625127340415, 104.1319473855536]  // NE
];
const NEA_BASE = "https://www.nea.gov.sg";

let rainLayer = null;
let rainEnabled = false;

function unixNow() {
  return Math.floor(Date.now() / 1000);
}

// NEA's rain area data publishes on 5-minute boundaries. Rounding down
// to the nearest 5 minutes ensures we hit a valid published timestamp.
function unixNowFloor5Min() {
  const fiveMin = 5 * 60;
  return Math.floor(Date.now() / 1000 / fiveMin) * fiveMin;
}

async function refreshRainArea() {
  try {
    const res = await fetch(`https://api.andewmole.com/cat1/RainArea?ts=${unixNowFloor5Min()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const list = await res.json();
    if (!Array.isArray(list) || list.length === 0) return;
    const latest = list[list.length - 1];
    const url = NEA_BASE + latest.Url;

    if (rainLayer) {
      rainLayer.setUrl(url);
    } else {
      // Create the layer but don't add to the map yet — toggle controls visibility.
      rainLayer = L.imageOverlay(url, RAIN_BOUNDS, {
        opacity: 0.6,
        interactive: false
      });
      if (rainEnabled) rainLayer.addTo(map);
    }
    const timeEl = document.getElementById('rain-time');
    if (timeEl) {
      // SortingTime is ISO-like ("2026-05-05T18:35:00") — extract HH:MM and strip the colon for hhmm.
      const m = (latest.SortingTime || '').match(/T(\d{2}):(\d{2})/);
      timeEl.textContent = m ? (m[1] + m[2]) : '';
    }
  } catch (err) {
    console.warn('Rain area refresh failed:', err);
  }
}

// Wire up the toggle
const rainToggle = document.getElementById('rain-toggle');
if (rainToggle) {
  rainToggle.addEventListener('change', e => {
    rainEnabled = e.target.checked;
    if (rainEnabled) {
      // Image is already loaded — just add it to the map for instant display.
      if (rainLayer && !map.hasLayer(rainLayer)) rainLayer.addTo(map);
    } else {
      if (rainLayer && map.hasLayer(rainLayer)) map.removeLayer(rainLayer);
    }
  });
}

// Preload the image on page load so toggling on is instant.
refreshRainArea();
// Poll every 10 second.
setInterval(refreshRainArea, 10000);

// =============================================================
// Heavy rain warning banner
// Polls /heavyrain. Shows a red banner with "<b>Title</b> Body"
// when there is one. Clicking X dismisses the *current* warning;
// if the warning text changes later, the banner reappears.
// =============================================================
let dismissedRainKey = null;

function setBanner(title, body) {
  const banner = document.getElementById('rain-banner');
  const textEl = document.getElementById('rain-banner-text');
  if (!banner || !textEl) return;

  if (!title && !body) {
    banner.classList.remove('visible');
    document.body.classList.remove('banner-visible');
    textEl.innerHTML = '';
    return;
  }

  const cleanBody = (body || '').replace(/<br\s*\/?>/gi, ' ').trim();
  const key = (title || '') + '||' + cleanBody;

  if (key === dismissedRainKey) {
    banner.classList.remove('visible');
    document.body.classList.remove('banner-visible');
    return;
  }

  // Title is bolded; body is plain text after a space.
  textEl.innerHTML = '<strong></strong> <span></span>';
  textEl.querySelector('strong').textContent = title || '';
  textEl.querySelector('span').textContent = cleanBody;
  banner.classList.add('visible');
  document.body.classList.add('banner-visible');
  banner.dataset.key = key;
}

document.getElementById('rain-banner-close').addEventListener('click', () => {
  const banner = document.getElementById('rain-banner');
  dismissedRainKey = banner.dataset.key || null;
  banner.classList.remove('visible');
  document.body.classList.remove('banner-visible');
});

async function refreshHeavyRain() {
  try {
    const res = await fetch(`https://api.andewmole.com/cat1/HeavyRain?ts=${unixNow()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const warning = data && data.warning;
    // "NIL" means no active warning — treat as empty.
    if (!warning || warning.trim().toUpperCase() === 'NIL') {
      setBanner(null, null);
    } else {
      setBanner(data.title, warning);
    }
  } catch (err) {
    console.warn('Heavy rain refresh failed:', err);
  }
}

refreshHeavyRain();
setInterval(refreshHeavyRain, 10000);
</script>
