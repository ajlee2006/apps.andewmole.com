<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregnancy Countdown</title>
<link rel="icon" href="/andewmole.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap');

  :root {
    --cream: #fdf8f2;
    --warm-white: #fffcf8;
    --blush: #f0d9cc;
    --dusty-rose: #c9847a;
    --deep-rose: #9e5a55;
    --deep-sage: #4a7060;
    --charcoal: #2d2d2d;
    --mid-grey: #6b6b6b;
    --light-grey: #d4cec8;
    --current-gold: #c8a45a;
    --current-gold-light: #f5edd8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }

  #setup-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
    background: linear-gradient(160deg, #fdf8f2 0%, #f5e8de 100%);
  }
  #setup-screen h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem,5vw,3.2rem); color: var(--deep-rose); text-align: center; margin-bottom: 0.4rem; line-height: 1.2; }
  #setup-screen .subtitle { font-size: 1rem; color: var(--mid-grey); text-align: center; margin-bottom: 2.5rem; font-weight: 300; letter-spacing: 0.04em; }

  .setup-card { background: white; border-radius: 20px; padding: 2.5rem 3rem; box-shadow: 0 8px 40px rgba(0,0,0,0.08); max-width: 440px; width: 100%; }
  .setup-card label { display: block; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--deep-sage); margin-bottom: 0.6rem; }
  .setup-card input[type="date"] { width: 100%; padding: 0.9rem 1.1rem; border: 1.5px solid var(--light-grey); border-radius: 10px; font-size: 1rem; font-family: 'Lato', sans-serif; color: var(--charcoal); background: var(--warm-white); outline: none; transition: border-color 0.2s; margin-bottom: 0.5rem; }
  .setup-card input[type="date"]:focus { border-color: var(--dusty-rose); }
  .hint { font-size: 0.8rem; color: var(--mid-grey); margin-bottom: 2rem; font-weight: 300; }
  .btn-primary { width: 100%; padding: 1rem; background: var(--deep-rose); color: white; border: none; border-radius: 10px; font-size: 1rem; font-family: 'Lato', sans-serif; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  .btn-primary:hover { background: #8a4a46; transform: translateY(-1px); }
  #setup-error { color: var(--dusty-rose); font-size: 0.85rem; margin-top: 0.6rem; display: none; }

  #app-screen { display: none; }

  header { background: white; border-bottom: 1px solid var(--blush); padding: 1rem 2rem 1rem 3rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--deep-rose); font-style: italic; }
  header .due-info { display: inline-flex; align-items: baseline; gap: 0.35rem; font-weight: 300; }
  header .due-info .due-label { font-size: 0.82rem; color: var(--mid-grey); }
  header .due-info strong { color: var(--charcoal); font-weight: 700; font-size: 0.82rem; white-space: nowrap; }
  .btn-reset { background: none; border: 1.5px solid var(--light-grey); border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.78rem; color: var(--mid-grey); cursor: pointer; font-family: 'Lato', sans-serif; transition: all 0.2s; margin-left: 1rem; }
  .btn-reset:hover { border-color: var(--dusty-rose); color: var(--dusty-rose); }

  .week-strip-wrapper { background: white; border-bottom: 1px solid var(--blush); padding: 0.8rem 1rem 0.6rem; overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--blush) transparent; }
  .week-strip { display: flex; gap: 6px; width: max-content; align-items: flex-end; }
  .week-dot { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 3px; border-radius: 8px; transition: background 0.15s; min-width: 38px; }
  .week-dot:hover { background: var(--cream); }
  .week-dot .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--light-grey); transition: all 0.2s; flex-shrink: 0; }
  .week-dot.past .dot { background: var(--blush); }
  .week-dot.current-week .dot { background: var(--current-gold); width: 14px; height: 14px; box-shadow: 0 0 0 3px var(--current-gold-light); }
  .week-dot.future .dot { background: #e0e0e0; }
  .week-dot.selected .dot { background: var(--deep-rose); width: 14px; height: 14px; }
  .week-dot.selected.current-week .dot { background: var(--current-gold); }
  .week-dot .wlabel { font-size: 0.62rem; color: var(--mid-grey); font-weight: 400; white-space: nowrap; }
  .week-dot.current-week .wlabel { color: var(--current-gold); font-weight: 700; }
  .week-dot.selected .wlabel { color: var(--deep-rose); font-weight: 700; }
  .week-dot.selected.current-week .wlabel { color: var(--current-gold); }

  .main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .week-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
  .week-number { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem,6vw,4rem); color: var(--deep-rose); line-height: 1; }
  .week-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--mid-grey); font-weight: 700; }
  .current-badge { display: none; background: var(--current-gold); color: white; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.25rem 0.7rem; border-radius: 20px; }
  .week-dates { font-size: 0.88rem; color: var(--mid-grey); margin-bottom: 0.2rem; font-weight: 300; }
  .trimester-tag { display: inline-block; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.2rem 0.7rem; border-radius: 12px; margin-bottom: 2rem; }
  .trimester-1 { background: #e8f4ed; color: var(--deep-sage); }
  .trimester-2 { background: #e8eef8; color: #4a6090; }
  .trimester-3 { background: #f4eae8; color: var(--deep-rose); }

  .fetus-card { background: white; border-radius: 20px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 2px 20px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
  .fetus-illustration { flex: 0 0 260px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; }
  .fetus-illustration img { width: 260px; height: 195px; object-fit: cover; border-radius: 10px; }
  .fetus-img-credit { font-size: 0.68rem; color: var(--light-grey); font-style: italic; text-align: center; }
  .fetus-img-credit a { color: var(--dusty-rose); text-decoration: none; }
  .fetus-img-credit a:hover { text-decoration: underline; }
  .size-info { flex: 1; min-width: 160px; }
  .size-info h3 { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--charcoal); margin-bottom: 0.8rem; }
  .size-row { display: flex; flex-direction: column; gap: 0.5rem; }
  .size-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
  .size-item .skey { color: var(--mid-grey); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.72rem; }
  .comparator { margin-top: 0.8rem; font-size: 0.88rem; color: var(--deep-sage); font-style: italic; }

  .milestones { background: white; border-radius: 20px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
  .milestones h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--charcoal); margin-bottom: 0; }
  .milestones-header { display: flex; align-items: center; gap: 0.5rem; position: relative; margin-bottom: 1.2rem; }
  .info-btn { background: none; border: none; cursor: pointer; padding: 0; color: var(--light-grey); transition: color 0.2s; display: inline-flex; align-items: center; }
  .info-btn:hover, .info-btn.active { color: var(--dusty-rose); }
  .info-btn svg { width: 18px; height: 18px; }
  .info-popup { display: none; position: absolute; top: calc(100% + 0.4rem); left: 0; right: 0; background: var(--charcoal); color: white; border-radius: 10px; padding: 0.8rem 1rem; font-size: 0.8rem; line-height: 1.55; max-width: 360px; z-index: 50; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
  .info-popup.show { display: block; }
  .info-popup a { color: var(--blush); text-decoration: underline; }
  .info-popup a:hover { color: white; }
  .milestones p { font-size: 0.95rem; line-height: 1.75; color: #444; margin-bottom: 1rem; }
  .milestones p:last-child { margin-bottom: 0; }
  .milestone-list { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; margin-top: 1rem; }
  .milestone-list li { display: flex; gap: 0.7rem; align-items: flex-start; font-size: 0.92rem; line-height: 1.6; color: #444; }
  .milestone-list li::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--dusty-rose); flex-shrink: 0; margin-top: 0.45em; }
  .week-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
  .nav-btn { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 0.4rem; background: none; border: 1.5px solid var(--light-grey); border-radius: 10px; padding: 0.65rem 1rem; font-size: 0.88rem; font-family: 'Lato', sans-serif; color: var(--mid-grey); cursor: pointer; transition: all 0.2s; line-height: 1.2; }
  .nav-btn:hover:not(:disabled) { border-color: var(--dusty-rose); color: var(--deep-rose); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #next-btn { flex-direction: row-reverse; }
  .jump-current-btn { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 0.4rem; background: var(--current-gold-light); border: 1.5px solid var(--current-gold); color: #8a6a20; border-radius: 10px; padding: 0.65rem 1rem; font-size: 0.82rem; font-family: 'Lato', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em; line-height: 1.2; }
  .jump-current-btn:hover { background: #f0e0b8; }
  .home-icon { position: fixed; top: 1.15rem; left: 1rem; width: 22px; height: 22px; color: var(--mid-grey); z-index: 200; transition: color 0.2s; display: inline-flex; align-items: center; }
  .home-icon:hover { color: var(--deep-rose); }
  .home-icon svg { width: 100%; height: 100%; }

  .side-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; background: white; border: 1.5px solid var(--light-grey); border-radius: 50%; font-size: 1.6rem; line-height: 1; color: var(--mid-grey); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; padding: 0 0 3px; font-family: 'Lato', sans-serif; z-index: 5; }
  .side-arrow:hover:not(:disabled) { border-color: var(--dusty-rose); color: var(--deep-rose); }
  .side-arrow:disabled { opacity: 0.25; cursor: default; }
  .side-arrow-left { left: -4rem; }
  .side-arrow-right { right: -4rem; }
  .week-header-row { position: relative; margin-bottom: 0.4rem; }
  @media (max-width: 900px) { .side-arrow { display: none; } }

  /* Bottom Prev/Next hidden on desktop (side arrows take their place); shown on mobile */
  .week-nav .nav-btn { display: none; }
  .week-nav { justify-content: center; gap: 0.6rem; }

  @media (max-width: 900px) {
    .week-nav .nav-btn { display: inline-flex; }
    .week-nav { justify-content: space-between; }
  }

  @media (max-width: 520px) {
    .fetus-card { flex-direction: column; align-items: center; text-align: center; }
    header { padding: 0.7rem 0.9rem 0.7rem 2.8rem; gap: 0.6rem; }
    .home-icon { top: 1rem; left: 0.85rem; }
    header .due-info { flex-direction: column; align-items: flex-end; gap: 0; line-height: 1.2; }
    header .due-info .due-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; }
    header .due-info strong { font-size: 0.82rem; }
    .btn-reset { margin-left: 0; padding: 0.35rem 0.65rem; font-size: 0.7rem; white-space: nowrap; }
    .btn-reset .reset-extra { display: none; }
    .main { padding: 1.5rem 1rem 4rem; }

    /* Always stack arrow above label on mobile — equal-width buttons with even spacing */
    .week-nav { gap: 0.5rem; align-items: stretch; justify-content: space-between; }
    .week-nav button { flex: 1 1 0; flex-direction: column; gap: 0.2rem; padding: 0.6rem 0.4rem; font-size: 0.82rem; min-width: 0; }
    #next-btn { flex-direction: column; }
    .week-nav button .arrow { font-size: 1.05rem; line-height: 1; }
    .week-nav button .label { text-align: center; white-space: normal; }
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>

<a href="/" class="home-icon" title="Back to home" aria-label="Back to home">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/>
  </svg>
</a>

<div id="setup-screen">
  <h1>Pregnancy<br>Countdown</h1>
  <p class="subtitle">A nine-month countdown to your due date</p>
  <div class="setup-card">
    <label for="due-date">Expected Due Date</label>
    <input type="date" id="due-date">
    <button class="btn-primary" onclick="startApp()">Begin Tracking</button>
    <p id="setup-error">Please enter a valid date.</p>
  </div>
</div>

<div id="app-screen">
  <header>
    <span class="logo">Pregnancy Countdown</span>
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <div class="due-info">
        <span class="due-label">Due</span>
        <strong id="header-due-date"></strong>
      </div>
      <button class="btn-reset" onclick="resetApp()">Change<span class="reset-extra"> date</span></button>
    </div>
  </header>
  <div class="week-strip-wrapper" id="week-strip-wrapper">
    <div class="week-strip" id="week-strip"></div>
  </div>
  <div class="main">
    <div class="week-header-row">
      <button class="side-arrow side-arrow-left" id="side-prev" onclick="goWeek(selectedWeek - 1)" aria-label="Previous week">‹</button>
      <button class="side-arrow side-arrow-right" id="side-next" onclick="goWeek(selectedWeek + 1)" aria-label="Next week">›</button>
      <div class="week-header">
        <span class="week-number" id="disp-week-num">–</span>
        <span class="week-label" id="week-label">weeks pregnant</span>
        <span class="current-badge" id="current-badge">Current week</span>
      </div>
    </div>
    <div class="week-dates" id="disp-week-dates"></div>
    <div class="trimester-tag" id="trimester-tag"></div>
    <div class="fetus-card">
      <div class="fetus-illustration" id="fetus-svg-container"></div>
      <div class="size-info">
        <h3>Size &amp; Growth</h3>
        <div class="size-row" id="size-row"></div>
        <div class="comparator" id="comparator"></div>
      </div>
    </div>
    <div class="milestones">
      <div class="milestones-header">
        <h2>Development this week</h2>
        <button class="info-btn" id="info-btn" aria-label="Sources" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </button>
        <div class="info-popup" id="info-popup">
          Text adapted from <a href="https://doh.sd.gov/media/bnemplje/fetal.pdf" target="_blank">SD Dept of Health: Fetal Growth and Development</a> and <a href="https://my.clevelandclinic.org/health/articles/7247-fetal-development-stages-of-growth" target="_blank">Cleveland Clinic</a>.
        </div>
      </div>
      <div id="milestone-content"></div>
    </div>
    <div class="week-nav">
      <button class="nav-btn" id="prev-btn" onclick="goWeek(selectedWeek - 1)"><span class="arrow">←</span><span class="label">Previous</span></button>
      <button class="jump-current-btn" id="jump-btn" onclick="goWeek(currentPregnancyWeek)"><span class="arrow">↩</span><span class="label">Current<span class="hide-mobile"> week</span></span></button>
      <button class="nav-btn" id="next-btn" onclick="goWeek(selectedWeek + 1)"><span class="arrow">→</span><span class="label">Next</span></button>
    </div>
  </div>
</div>

// ─── WEEK DATA ──────────────────────────────────────────────────────────────
const WEEK_DATA = {
  1:  { length: '< 0.1 mm', weight: '–', compare: 'a poppy seed', text: ['Fertilization occurs as one sperm penetrates the egg, forming a zygote with all 46 chromosomes.', 'The zygote immediately begins dividing as it travels down the fallopian tube toward the uterus.'] },

// ─── STATE & LOGIC ──────────────────────────────────────────────────────────
let dueDateStr = null;          // YYYY-MM-DD
let rawCurrentWeek = 0;          // can be <1 (not yet pregnant) or >40 (already born)
let currentPregnancyWeek = null; // = rawCurrentWeek if in [1,40], else null
let selectedWeek = 1;

const DAY_MS = 86400000;
const START_OFFSET = 279;   // days before due date that week 1 starts (so week 40 ends ON due date)

// Convert YYYY-MM-DD to days-since-epoch (timezone-independent)
function dayNum(s) {
  const [y, m, d] = s.split('-').map(Number);
  return Math.floor(Date.UTC(y, m - 1, d) / DAY_MS);
}

// Today as YYYY-MM-DD (using local calendar date)
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Add N days to a YYYY-MM-DD string, return new YYYY-MM-DD
function addDays(s, n) {
  const d = new Date((dayNum(s) + n) * DAY_MS); // UTC
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

// Pretty-format a YYYY-MM-DD string for display
function fmtDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(Date.UTC(y, m-1, d)).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', timeZone: 'UTC' });
}

function dayName(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(Date.UTC(y, m-1, d)).toLocaleDateString('en-GB', { weekday: 'long', timeZone: 'UTC' });
}

// Tooltip text: "Monday (in 108 days)", "Tuesday (today)", "Wednesday (7 days ago)"
function dayTooltip(s) {
  const diff = dayNum(s) - dayNum(todayStr());
  let suffix;
  if (diff === 0) suffix = 'today';
  else if (diff === 1) suffix = 'tomorrow';
  else if (diff === -1) suffix = 'yesterday';
  else if (diff > 0) suffix = `in ${diff} days`;
  else suffix = `${-diff} days ago`;
  return `${dayName(s)} (${suffix})`;
}

function getWeekRange(week) {
  const startOfPregnancy = addDays(dueDateStr, -START_OFFSET);
  const start = addDays(startOfPregnancy, (week - 1) * 7);
  const end = addDays(start, 6);
  return { start, end };
}

function computeCurrentWeek() {
  const diff = dayNum(todayStr()) - dayNum(dueDateStr);
  return Math.floor((diff + START_OFFSET) / 7) + 1;
}

function applyDueDate(input) {
  dueDateStr = input;
  rawCurrentWeek = computeCurrentWeek();
  currentPregnancyWeek = (rawCurrentWeek >= 1 && rawCurrentWeek <= 40) ? rawCurrentWeek : null;
}

function startApp() {
  const input = document.getElementById('due-date').value;
  if (!input || !/^\d{4}-\d{2}-\d{2}$/.test(input)) { showErr(); return; }
  applyDueDate(input);
  localStorage.setItem('pregnancy-due-date', input);
  setUrlDate(input);
  launchApp();
}
function setUrlDate(iso) {
  const url = new URL(window.location.href);
  url.searchParams.set('due', iso);
  window.history.replaceState({}, '', url);
}
function setUrlWeek(week) {
  const url = new URL(window.location.href);
  if (currentPregnancyWeek !== null && week === currentPregnancyWeek) {
    url.searchParams.delete('w');
  } else {
    url.searchParams.set('w', week);
  }
  window.history.replaceState({}, '', url);
}
function clearUrlDate() {
  const url = new URL(window.location.href);
  url.searchParams.delete('due');
  url.searchParams.delete('w');
  window.history.replaceState({}, '', url);
}
function showErr() { document.getElementById('setup-error').style.display='block'; }
function resetApp() {
  localStorage.removeItem('pregnancy-due-date');
  clearUrlDate();
  document.getElementById('setup-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}
function launchApp() {
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  const hdrDue = document.getElementById('header-due-date');
  hdrDue.textContent = fmtDate(dueDateStr);
  hdrDue.title = dayTooltip(dueDateStr);
  buildWeekStrip();
  // Initial week to show: from URL ?w= if valid, else current week if in range, else clamp to 1 or 40
  const urlW = parseInt(new URL(window.location.href).searchParams.get('w'), 10);
  const fallback = currentPregnancyWeek ?? (rawCurrentWeek < 1 ? 1 : 40);
  const initialWeek = (urlW >= 1 && urlW <= 40) ? urlW : fallback;
  goWeek(initialWeek);
}

function buildWeekStrip() {
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  for (let w = 1; w <= 40; w++) {
    const dot = document.createElement('div');
    let cls;
    if (w === currentPregnancyWeek) cls = 'current-week';
    else if (w < rawCurrentWeek) cls = 'past';
    else cls = 'future';
    dot.className = 'week-dot ' + cls;
    dot.id = `wdot-${w}`;
    dot.innerHTML = `<div class="dot"></div><div class="wlabel">W${w}</div>`;
    dot.addEventListener('click', () => goWeek(w));
    strip.appendChild(dot);
  }
}

function updateStrip(week) {
  document.querySelectorAll('.week-dot').forEach(d => d.classList.remove('selected'));
  const dot = document.getElementById(`wdot-${week}`);
  if (dot) {
    dot.classList.add('selected');
    const wrap = document.getElementById('week-strip-wrapper');
    wrap.scrollTo({ left: dot.offsetLeft - wrap.offsetWidth/2 + dot.offsetWidth/2, behavior:'smooth' });
  }
}

function goWeek(week) {
  week = Math.max(1, Math.min(40, week));
  selectedWeek = week;
  updateStrip(week);
  setUrlWeek(week);

  const d = WEEK_DATA[week] || WEEK_DATA[40];
  const { start, end } = getWeekRange(week);
  const isCurrent = currentPregnancyWeek !== null && week === currentPregnancyWeek;

  document.getElementById('disp-week-num').textContent = week;
  document.getElementById('week-label').textContent = (week === 1 ? 'week' : 'weeks') + ' pregnant';
  document.getElementById('current-badge').style.display = isCurrent ? 'inline-block' : 'none';
  document.getElementById('disp-week-dates').innerHTML =
    `<span title="${dayTooltip(start)}">${fmtDate(start)}</span> – <span title="${dayTooltip(end)}">${fmtDate(end)}</span>`;

  const ttag = document.getElementById('trimester-tag');
  if (week <= 12)      { ttag.textContent = 'First Trimester';  ttag.className = 'trimester-tag trimester-1'; }
  else if (week <= 27) { ttag.textContent = 'Second Trimester'; ttag.className = 'trimester-tag trimester-2'; }
  else                 { ttag.textContent = 'Third Trimester';  ttag.className = 'trimester-tag trimester-3'; }

  const container = document.getElementById('fetus-svg-container');
  container.innerHTML = `<img src="${BC_IMGS[week]}" alt="Fetus at week ${week}" loading="lazy">
    <div class="fetus-img-credit">Image © <a href="https://www.babycenter.com" target="_blank">BabyCenter</a></div>`;
  document.getElementById('size-row').innerHTML =
    `<div class="size-item"><span class="skey">Length</span><span class="sval">${d.length}</span></div>
     <div class="size-item"><span class="skey">Weight</span><span class="sval">${d.weight}</span></div>`;
  document.getElementById('comparator').textContent = '≈ ' + d.compare;

  let html = d.text.map(t => `<p>${t}</p>`).join('');
  document.getElementById('milestone-content').innerHTML = html;

  document.getElementById('prev-btn').disabled = week <= 1;
  document.getElementById('next-btn').disabled = week >= 40;
  document.getElementById('side-prev').disabled = week <= 1;
  document.getElementById('side-next').disabled = week >= 40;
  // Jump button shows only when there IS a current week and we're not already on it
  const showJump = currentPregnancyWeek !== null && !isCurrent;
  document.getElementById('jump-btn').style.display = showJump ? 'flex' : 'none';
}

window.addEventListener('DOMContentLoaded', () => {
  // Info popup toggle
  const infoBtn = document.getElementById('info-btn');
  const infoPopup = document.getElementById('info-popup');
  infoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const showing = infoPopup.classList.toggle('show');
    infoBtn.classList.toggle('active', showing);
  });
  document.addEventListener('click', (e) => {
    if (!infoPopup.contains(e.target) && !infoBtn.contains(e.target)) {
      infoPopup.classList.remove('show');
      infoBtn.classList.remove('active');
    }
  });

  const urlDue = new URL(window.location.href).searchParams.get('due');
  const saved = urlDue || localStorage.getItem('pregnancy-due-date');
  if (saved && /^\d{4}-\d{2}-\d{2}$/.test(saved)) {
    applyDueDate(saved);
    document.getElementById('due-date').value = saved;
    localStorage.setItem('pregnancy-due-date', saved);
    setUrlDate(saved);
    launchApp(); return;
  }
  // Default suggestion: 140 days from today
  document.getElementById('due-date').value = addDays(todayStr(), 140);
});
</script>
