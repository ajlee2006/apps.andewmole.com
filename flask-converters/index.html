<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Converters</title>
<link rel="icon" href="/andewmole.png" type="image/png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Text Converters</h1>
</header>

<main>
  <div class="tool-bar">
    <label for="tool">Tool:</label>
    <select id="tool"></select>
    <div class="options" id="options"></div>
  </div>

  <div class="description" id="description"></div>

  <div class="io">
    <div class="pane">
      <div class="pane-header">
        <span id="input-label">Input</span>
        <span class="count" id="count">0</span>
      </div>
      <textarea id="input" placeholder="Enter text" spellcheck="false"></textarea>
      <div class="pane-footer" style="justify-content: space-between;">
        <button class="icon" id="clear-btn">Clear</button>
        <button class="primary" id="enter-btn" title="Run conversion (Ctrl/Cmd+Enter)">Enter</button>
      </div>
    </div>
    <div class="pane">
      <div class="pane-header">
        <span id="output-label">Output</span>
      </div>
      <div class="output" id="output"></div>
      <div class="pane-footer">
        <button class="icon" id="swap-btn" title="Move output to input">↑ Use as input</button>
        <button class="icon" id="copy-btn">Copy</button>
      </div>
    </div>
  </div>

  <div class="notice" id="notice"></div>
</main>

<footer>All conversions run locally in your browser.</footer>

<script src="app.js" type="module"></script>

</body>
</html>
