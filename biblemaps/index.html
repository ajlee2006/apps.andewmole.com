<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bible Places Map</title>
<link rel="icon" href="/andewmole.png" type="image/png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="map"></div>

<div id="bar">
  <div class="barRow">
    <input id="search" placeholder="Search places…" autocomplete="off">
    <button class="pill iconpill" id="searchClear" title="Clear search" aria-label="Clear search">✕</button>
    <button class="pill iconpill" id="filterBtn" title="Filter by book" aria-label="Filter by book">
      <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path fill="currentColor" d="M2 3h12l-4.5 5.5V14l-3-1.5V8.5z"/></svg>
    </button>
  </div>
  <div id="count"></div>
  <div id="suggest"></div>
  <div id="filterMenu" hidden></div>
</div>

<div id="layerSwatch" title="Switch basemap"><div class="lbl" id="layerLbl">Map</div></div>

<button id="infoBtn" title="About">i</button>

<div id="panel">
  <div class="p-head">
    <div style="flex:1;display:flex;align-items:baseline;flex-wrap:wrap">
      <h2 class="p-title" id="pTitle"></h2>
      <span class="p-sub" id="pSub"></span>
    </div>
    <button class="iconbtn star" id="pStar" title="Star this place">
      <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 5.9 6.5.95-4.7 4.58 1.1 6.47L12 17.9l-5.8 3.05 1.1-6.47-4.7-4.58 6.5-.95z"/></svg>
    </button>
    <button class="iconbtn pclose" id="pClose" title="Close" aria-label="Close">✕</button>
  </div>
  <div class="p-body" id="pBody"></div>
</div>

<div id="ov">
  <div class="modal">
    <div class="m-head">
      <button type="button" id="mPrev" class="m-nav" title="Previous verse" aria-label="Previous verse">‹</button>
      <button type="button" id="mRef" class="m-ref m-ref-btn" title="Jump to verse"></button>
      <button type="button" id="mNext" class="m-nav" title="Next verse" aria-label="Next verse">›</button>
      <div class="m-version" id="mVersion" title="Translation">
        <button type="button" id="mVersionBtn" class="m-version-btn" aria-haspopup="listbox" aria-expanded="false">
          <span id="mVersionLabel">KJV</span>
        </button>
        <ul id="mVersionMenu" class="m-version-menu" role="listbox" hidden></ul>
      </div>
      <button class="x" id="mClose">✕</button>
    </div>
    <div class="m-body" id="mBody"></div>
  </div>
</div>

<div id="navOv">
  <div class="modal nav-modal">
    <div class="m-head">
      <div class="m-ref">Go to verse</div>
      <button class="x" id="navClose">✕</button>
    </div>
    <div class="nav-body">
      <div class="nav-row">
        <select id="navBook" class="nav-select"></select>
        <select id="navChapter" class="nav-select short"></select>
        <span class="nav-sep">:</span>
        <select id="navVerse" class="nav-select short"></select>
      </div>
      <button id="navGo" class="nav-go">Go</button>
    </div>
  </div>
</div>

<div id="infoOv">
  <div class="modal">
    <div class="m-head"><div class="m-ref">Credits</div><button class="x" id="infoClose">✕</button></div>
    <div class="m-body info-body">
      <p><a href="https://play.google.com/store/apps/details?id=palki.maps" target="_blank" rel="noopener">Bible Maps</a> by <a href="https://github.com/yukuku/androidbible" target="_blank" rel="noopener">Yuku</a></p>
      <p>Developers: Michael Kevin Yang, Jaya Satrio Hendrick, Yuku Sugianto</p>
      <p>Place data and images from <a href="https://www.openbible.info/geo/" target="_blank" rel="noopener">OpenBible.info</a>, licensed under <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a></p>
      <p>Bible verses via <a href="https://bible-api.com/" target="_blank" rel="noopener">bible-api.com</a></p>
      <p>Created by <a href="/">Andrew Lee</a></p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="app.js" charset="utf-8"></script>
</body>
</html>
