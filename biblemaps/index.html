<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bible Places Map</title>
<link rel="icon" href="/andewmole.png" type="image/png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="map"></div>

<div id="bar">
  <div class="barRow">
    <input id="search" placeholder="Search places…" autocomplete="off">
    <button class="pill" id="starFilter" title="Show starred only">★</button>
  </div>
  <div id="count"></div>
  <div id="suggest"></div>
</div>

<div id="layerSwatch" title="Switch basemap"><div class="lbl" id="layerLbl">Map</div></div>

<button id="infoBtn" title="About">i</button>

<div id="panel">
  <div class="p-head">
    <div style="flex:1;display:flex;align-items:baseline;flex-wrap:wrap">
      <h2 class="p-title" id="pTitle"></h2>
      <span class="p-sub" id="pSub"></span>
    </div>
    <button class="iconbtn star" id="pStar" title="Star this place">
      <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 5.9 6.5.95-4.7 4.58 1.1 6.47L12 17.9l-5.8 3.05 1.1-6.47-4.7-4.58 6.5-.95z"/></svg>
    </button>
    <button class="iconbtn" id="pClose" title="Close" style="font-size:18px">✕</button>
  </div>
  <div class="p-body" id="pBody"></div>
</div>

<div id="ov">
  <div class="modal">
    <div class="m-head"><div class="m-ref" id="mRef"></div><button class="x" id="mClose">✕</button></div>
    <div class="m-body" id="mBody"></div>
  </div>
</div>

<div id="infoOv">
  <div class="modal">
    <div class="m-head"><div class="m-ref">About</div><button class="x" id="infoClose">✕</button></div>
    <div class="m-body info-body">
      <h3>Credits</h3>
      <p><a href="https://play.google.com/store/apps/details?id=palki.maps" target="_blank" rel="noopener">Bible Maps</a> by <a href="https://github.com/yukuku/androidbible" target="_blank" rel="noopener">Yuku</a></p>
      <p>Developers: Michael Kevin Yang, Jaya Satrio Hendrick, Yuku Sugianto</p>
      <p>Based on <a href="https://www.openbible.info/" target="_blank" rel="noopener">OpenBible.info</a></p>
      <p>Created by <a href="/">Andrew Lee</a></p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="app.js"></script>
</body>
</html>
